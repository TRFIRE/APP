        function AdminMenuScreen({ onNavigate, onOpenMenu }) {
            return (
                <div className="flex flex-col h-full bg-white dark:bg-brand-dark overflow-y-auto animate-fade-in relative">
                    <div className="bg-cyan-700 p-4 flex justify-between items-center text-white sticky top-0 z-10 shadow-md">
                        <button onClick={onOpenMenu} className="w-10 h-10 flex items-center justify-start text-2xl active:scale-90 transition-transform"><i className="fas fa-bars"></i></button>
                        <h1 className="font-black text-lg tracking-tight uppercase">Parâmetros Admin</h1>
                        <div className="w-10"></div>
                    </div>
                    <div className="p-4 w-full space-y-4 mt-4">
                        <button onClick={() => onNavigate('accessControl')} className="w-full py-4 bg-purple-600 text-white rounded-2xl font-bold shadow-md active:scale-95 transition-transform flex items-center px-6"><i className="fas fa-key w-8 text-xl"></i> CONTROLE DE ACESSO</button>
                        <button onClick={() => onNavigate('unitRegister')} className="w-full py-4 bg-gray-600 text-white rounded-2xl font-bold shadow-md active:scale-95 transition-transform flex items-center px-6"><i className="fas fa-building w-8 text-xl"></i> GESTÃO DE UNIDADES</button>
                        <button onClick={() => onNavigate('roundLocRegister')} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-md active:scale-95 transition-transform flex items-center px-6"><i className="fas fa-map-marked-alt w-8 text-xl"></i> LOCAIS DE RONDA</button>
                        <button onClick={() => onNavigate('subLocRegister')} className="w-full py-4 bg-teal-600 text-white rounded-2xl font-bold shadow-md active:scale-95 transition-transform flex items-center px-6"><i className="fas fa-layer-group w-8 text-xl"></i> LOCAIS E SUBLOCAIS</button>
                        <button onClick={() => onNavigate('userRegister')} className="w-full py-4 bg-gray-700 text-white rounded-2xl font-bold shadow-md active:scale-95 transition-transform flex items-center px-6"><i className="fas fa-users-cog w-8 text-xl"></i> GERIR EQUIPE</button>
                    </div>
                </div>
            );
        };

        function AccessControlScreen({ onNavigate, usersList, onUpdatePermissions }) {
             const [selectedUser, setSelectedUser] = useState(null);
             const togglePermission = (permId) => { if(!selectedUser) return; const current = selectedUser.permissions || []; const next = current.includes(permId) ? current.filter(p=>p!==permId) : [...current, permId]; setSelectedUser({...selectedUser, permissions: next}); onUpdatePermissions(selectedUser.id, next); };
             return (
                <div className="flex flex-col h-full bg-white dark:bg-brand-dark p-4 animate-fade-in relative">
                    <div className="absolute top-4 left-4"><button onClick={() => selectedUser ? setSelectedUser(null) : onNavigate('adminMenu')} className="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-white shadow-sm"><i className="fas fa-arrow-left"></i></button></div>
                    <div className="mt-16 text-center mb-6"><h2 className="text-xl font-black dark:text-white">CONTROLE DE ACESSO</h2></div>
                    {!selectedUser ? (
                        <div className="space-y-3">{usersList && usersList.filter(u=>u.name!=='ADMIN').map(u=>(<div key={u.id} onClick={()=>setSelectedUser(u)} className="bg-gray-100 p-4 rounded-xl font-bold">{u.name}</div>))}</div>
                    ) : (
                        <div className="space-y-3">
                            {['EXTINTOR','HIDRANTE','SPK','HISTORICO','RONDA'].map(p=>(
                                <div key={p} onClick={()=>togglePermission(p)} className={`p-4 rounded-xl font-bold border-2 ${selectedUser.permissions?.includes(p)?'border-green-500 bg-green-50 text-green-700':'border-gray-200 bg-gray-50 text-gray-400'}`}>{p}</div>
                            ))}
                        </div>
                    )}
                </div>
             );
        };

        function RoundsLocationScreen({ onNavigate, onSelectLocation, db, responsibleName, roundLocationsList, onOpenMenu }) {
            const [shiftInfo, setShiftInfo] = useState({ name: '', start: null, end: null, isNight: false });
            const [tick, setTick] = useState(0); 
            const [selectedLocation, setSelectedLocation] = useState(null); 

            useEffect(() => {
                const updateShift = () => {
                    const now = new Date();
                    const hour = now.getHours();
                    let start = new Date(now);
                    let end = new Date(now);
                    let name = "";
                    let isNight = false;

                    if (hour >= 6 && hour < 18) {
                        name = "Turno Diurno";
                        isNight = false;
                    } else {
                        name = "Turno Noturno";
                        isNight = true;
                    }
                    setShiftInfo({ name, isNight });
                };
                updateShift();
                const interval = setInterval(() => { setTick(t => t + 1); updateShift(); }, 60000); 
                return () => clearInterval(interval);
            }, []);

            const isLocationDone = (location) => {
                if (!shiftInfo.start || !db) return false;
                return db.some(item => {
                    if (item.type !== 'RONDA' || item.deleted) return false;
                    const itemDate = new Date(item.created_at);
                    return item.sector === location && itemDate >= shiftInfo.start && itemDate <= shiftInfo.end;
                });
            };

            const getRoundStatus = (location, roundNumber) => {
                const now = new Date();
                let start = new Date(now);
                let end = new Date(now);
                
                if (!shiftInfo.isNight) {
                    if (roundNumber === 1) { start.setHours(6, 0, 0, 0); end.setHours(11, 59, 59, 999); } 
                    else { start.setHours(12, 0, 0, 0); end.setHours(17, 59, 59, 999); }
                } else {
                    const hour = now.getHours();
                    if (roundNumber === 1) {
                        if (hour < 18) { start.setDate(start.getDate() - 1); end.setDate(end.getDate() - 1); }
                        start.setHours(18, 0, 0, 0); end.setHours(23, 59, 59, 999);
                    } else {
                        if (hour >= 18) { start.setDate(start.getDate() + 1); end.setDate(end.getDate() + 1); }
                        start.setHours(0, 0, 0, 0); end.setHours(5, 59, 59, 999);
                    }
                }

                const isDone = db.some(item => {
                    if (item.type !== 'RONDA' || item.deleted) return false;
                    const itemDate = new Date(item.created_at);
                    return item.sector === location && itemDate >= start && itemDate <= end;
                });

                let timeText = "";
                const diffMs = end - now;
                
                const isExpired = diffMs < 0; 
                const isFuture = now < start;

                if (isExpired) {
                    timeText = "Encerrado";
                } else if (isFuture) {
                    timeText = "Aguardando horário";
                } else {
                    const diffHrs = Math.floor(diffMs / (1000 * 60 * 60));
                    const diffMins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                    timeText = `${diffHrs}h ${diffMins}m restantes`;
                }

                return { isDone, timeText, isExpired, isFuture, start, end };
            };

            const handleLocationClick = (locName) => { setSelectedLocation(locName); };

            const getActiveRoundInfo = (location) => {
                const now = new Date();
                const hour = now.getHours();
                let activeRound = 1;
                if (!shiftInfo.isNight) {
                    if (hour >= 12) activeRound = 2;
                } else {
                    if (hour >= 0 && hour < 6) activeRound = 2;
                }
                const status = getRoundStatus(location, activeRound);
                return { num: activeRound, ...status };
            };

            return (
                <div className="flex flex-col h-full bg-gray-50 dark:bg-brand-dark animate-fade-in relative">
                    <div className="bg-brand-blue p-4 flex justify-between items-center text-white sticky top-0 z-10 shadow-md">
                        <button onClick={onOpenMenu} className="w-10 h-10 flex items-center justify-start text-2xl active:scale-90 transition-transform"><i className="fas fa-bars"></i></button>
                        <h1 className="font-black text-lg tracking-tight uppercase">Ronda Diária</h1>
                        <div className="w-10"></div>
                    </div>
                    <div className="flex-1 overflow-y-auto space-y-3 p-4 pb-6">
                        {roundLocationsList.map(loc => {
                            const done = isLocationDone(loc.name);
                            const activeInfo = getActiveRoundInfo(loc.name);
                            return (
                                <button key={loc.id} onClick={() => handleLocationClick(loc.name)} className={`w-full py-4 bg-white dark:bg-gray-800 border-2 ${done ? 'border-green-500' : 'border-gray-100 dark:border-gray-700 hover:border-blue-500'} text-gray-700 dark:text-white rounded-2xl text-lg font-bold shadow-sm flex items-center justify-between px-4`}>
                                    <div className="flex flex-col items-start">
                                        <span>{loc.name}</span>
                                        <span className={`text-[10px] font-bold uppercase mt-1 ${done ? 'text-green-500' : 'text-orange-500'}`}>{done ? 'Realizado' : 'Pendente'}</span>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="flex flex-col items-end">
                                            <span className={`text-[10px] font-black px-2 py-0.5 rounded uppercase ${activeInfo.isDone ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>
                                                {activeInfo.num}ª RONDA
                                            </span>
                                            <span className={`text-xs font-mono font-bold mt-0.5 ${activeInfo.timeText === 'Encerrado' ? 'text-red-500' : 'text-brand-blue'}`}>
                                                {activeInfo.timeText}
                                            </span>
                                        </div>
                                        <i className={`fas ${done ? 'fa-check text-green-500' : 'fa-chevron-right text-gray-300'}`}></i>
                                    </div>
                                </button>
                            );
                        })}
                    </div>
                    {selectedLocation && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in" onClick={() => setSelectedLocation(null)}>
                            <div className="bg-white dark:bg-gray-900 w-full max-w-sm rounded-3xl p-6 shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setSelectedLocation(null)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i className="fas fa-times text-xl"></i></button>
                                <h3 className="text-xl font-black text-center mb-2 dark:text-white">{selectedLocation}</h3>
                                <p className="text-center text-blue-600 font-bold text-sm mb-6 uppercase">{shiftInfo.name}</p>
                                <div className="space-y-4">
                                    {[1, 2].map(num => {
                                        const status = getRoundStatus(selectedLocation, num);
                                        const isLocked = !status.isDone && (status.isExpired || status.isFuture);

                                        return (
                                            <div 
                                                key={num} 
                                                onClick={() => !isLocked && onSelectLocation(selectedLocation)} 
                                                className={`p-4 rounded-xl border-l-4 shadow-sm flex justify-between items-center transition-all 
                                                    ${status.isDone ? 'bg-green-50 border-green-500 cursor-pointer' : 
                                                      isLocked ? 'bg-gray-100 border-gray-400 opacity-60 cursor-not-allowed' : 
                                                      'bg-white border-blue-500 cursor-pointer active:scale-95 shadow-md'}`}
                                            >
                                                <div>
                                                    <span className={`font-black text-lg block ${isLocked ? 'text-gray-500' : 'text-gray-800 dark:text-white'}`}>{num}ª RONDA</span>
                                                    <span className={`text-xs font-bold ${status.isDone ? 'text-green-600' : isLocked ? 'text-red-500' : 'text-orange-500'}`}>
                                                        {status.isDone ? 'REALIZADA' : (status.isExpired ? 'PRAZO EXPIRADO' : (status.isFuture ? 'AGUARDANDO' : 'DISPONÍVEL'))}
                                                    </span>
                                                </div>
                                                <div className="text-right">
                                                    <span className="text-xs text-gray-500 font-medium block">Prazo</span>
                                                    <span className={`text-xs font-bold ${status.isExpired ? 'text-red-500' : 'text-blue-600'}`}>{status.timeText}</span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        function ScannerScreen({ onNavigate, onScanSuccess, db, inspectionType, showAlert }) {
            const scannerRef = useRef(null);
            useEffect(() => {
                const scanner = new Html5Qrcode("reader");
                scannerRef.current = scanner;
                const config = { fps: 10, qrbox: { width: 250, height: 250 } };
                
                let isProcessing = false;
                const onDecodeSuccess = (decodedText) => {
                    if (isProcessing) return;
                    isProcessing = true;

                    scanner.stop().then(() => {
                        scanner.clear();
                        let data = { equipmentId: decodedText, equipmentName: decodedText };
                        try { 
                            const parsed = JSON.parse(decodedText); 
                            const id = parsed.id || parsed.ID || parsed.equipmentId || parsed.codigo || parsed.code;
                            const name = parsed.name || parsed.NAME || parsed.equipmentName || parsed.nome || parsed.descricao || decodedText;
                            if (id) { data.equipmentId = id; data.equipmentName = name; }
                        } catch(e) {}

                        if (inspectionType !== 'RONDA') {
                            const currentMonth = new Date().toISOString().slice(0, 7); 
                            const isDuplicate = db.some(item => !item.deleted && item.type === inspectionType && (item.equipmentId || '').toString() === data.equipmentId.toString() && item.created_at.startsWith(currentMonth));
                            if (isDuplicate) { showAlert(`⚠️ EQUIPAMENTO JÁ VISTORIADO!\n\nEste código já foi registrado em ${new Date().toLocaleString('pt-BR', { month: 'long' })}.\nNova leitura permitida apenas no mês seguinte.`, "warning"); onNavigate('menu'); return; }
                        }
                        onScanSuccess(data);
                    }).catch(err => console.error(err));
                };

                scanner.start({ facingMode: { exact: "environment" } }, config, onDecodeSuccess, () => {})
                    .catch((err) => {
                        scanner.start({ facingMode: "environment" }, config, onDecodeSuccess, () => {})
                            .catch(err2 => console.error("Erro no Scanner:", err2));
                    });

                return () => { if (scanner.isScanning) scanner.stop().catch(()=>{}); };
            }, [db, inspectionType]);

            return (
                <div className="flex flex-col h-full bg-black relative">
                    <div className="absolute top-4 left-4 z-20"><button onClick={() => onNavigate('menu')} className="text-white bg-black/40 w-10 h-10 rounded-full flex items-center justify-center"><i className="fas fa-arrow-left"></i></button></div>
                    <div className="flex-1 flex flex-col items-center justify-center bg-gray-900"><div id="reader" className="w-full max-w-md bg-black"></div><p className="text-white/60 text-sm mt-4">Aponte para o QR Code</p></div>
                    <div className="p-4 bg-white dark:bg-brand-dark rounded-t-3xl z-10 safe-area-bottom"></div>
                </div>
            );
        };

        function RoundsFormScreen({ initialData, onNavigate, onSave, responsibleName, roundLocation, currentUnit, showAlert }) {
            const savedForm = useMemo(() => {
                const saved = localStorage.getItem('trfire_temp_round');
                return saved ? JSON.parse(saved) : null;
            }, []);

             const [isSaving, setIsSaving] = useState(false);
             const [form, setForm] = useState(() => {
                 if (initialData && initialData.id) {
                     return { ...initialData }; 
                 }
                 return savedForm || { type: 'RONDA', sector: roundLocation, equipmentName: initialData?.equipmentName || '', moduleLocation: '', status: '', photo: null, photo2: null, obs: '', responsible: responsibleName, created_at: new Date().toISOString(), deleted: false };
             });
             
             const fileInputRef1 = useRef(null);
             const fileInputRef2 = useRef(null);
             
             useEffect(() => {
                 localStorage.setItem('trfire_temp_round', JSON.stringify(form));
             }, [form]);

             const handlePhotoChange = (e, field) => { 
                const file = e.target.files[0]; 
                if (file) { 
                    const reader = new FileReader(); 
                    reader.onload = (event) => { 
                        const img = new Image(); 
                        img.onload = () => { 
                            const canvas = document.createElement('canvas'); 
                            const ctx = canvas.getContext('2d'); 
                            
                            const targetWidth = 200; 
                            const targetHeight = 230; 
                            canvas.width = targetWidth; 
                            canvas.height = targetHeight; 
                            
                            const ratio = Math.max(targetWidth / img.width, targetHeight / img.height); 
                            const newWidth = img.width * ratio; 
                            const newHeight = img.height * ratio; 
                            const offsetX = (targetWidth - newWidth) / 2; 
                            const offsetY = (targetHeight - newHeight) / 2; 
                            
                            ctx.drawImage(img, offsetX, offsetY, newWidth, newHeight); 
                            setForm(prev => ({ ...prev, [field]: canvas.toDataURL('image/jpeg', 0.4) })); 
                        }; 
                        img.src = event.target.result; 
                    }; 
                    reader.readAsDataURL(file); 
                } 
             };

             const save = async () => { 
                 if (!form.moduleLocation || !form.photo) return showAlert("Preencha tudo e tire a Foto 1.", "warning"); 
                 setIsSaving(true); 
                 const success = await onSave(form); 
                 setIsSaving(false);
                 if(success) localStorage.removeItem('trfire_temp_round');
             };
             return (
                <div className="flex flex-col h-full bg-gray-50 dark:bg-black">
                    <div className="bg-white dark:bg-gray-900 p-3 shadow-sm flex items-center justify-between sticky top-0 z-20"><button onClick={() => onNavigate('roundsLocation')} className="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full"><i className="fas fa-arrow-left"></i></button><h2 className="text-lg font-bold">Ronda</h2><button onClick={save} disabled={isSaving} className="bg-blue-500 text-white px-4 py-2 rounded font-bold" type="button">{isSaving ? '...' : 'SALVAR'}</button></div>
                    <div className="flex-1 overflow-y-auto p-2 space-y-4">
                        <div className="bg-white p-4 rounded-xl space-y-4 shadow-sm border border-gray-100">
                            <input value={form.equipmentName} disabled className="w-full bg-gray-100 p-3 rounded font-bold" />
                            <div className="mt-2">
                                <label className="text-xs font-bold text-gray-500 dark:text-gray-400 block mb-1">Condições ? *</label>
                                <select value={form.moduleLocation} onChange={e=>setForm({...form, moduleLocation:e.target.value})} className="w-full p-3 bg-gray-100 dark:bg-gray-800 rounded-xl border-2 border-gray-200 dark:border-gray-700 focus:border-brand-orange outline-none dark:text-white font-bold text-gray-700 uppercase appearance-none">
                                    <option value="">Selecione...</option>
                                    {ROUND_CONDITIONS.map(o=><option key={o} value={o}>{o}</option>)}
                                </select>
                            </div>
                            <div className="mt-2">
                                <label className="text-xs font-bold text-gray-500 dark:text-gray-400 block mb-1">Status</label>
                                <select value={form.status} onChange={e=>setForm({...form, status:e.target.value})} className="w-full p-3 bg-gray-100 dark:bg-gray-800 rounded-xl border-2 border-gray-200 dark:border-gray-700 focus:border-brand-orange outline-none dark:text-white font-bold text-gray-700 appearance-none">
                                    <option value="">Status...</option>
                                    <option value="Conforme">Conforme</option>
                                    <option value="Não Conforme">Não Conforme</option>
                                </select>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-3 mt-4">
                                <div className="flex flex-col gap-1.5">
                                    <div onClick={()=>fileInputRef1.current.click()} className="w-full h-48 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl flex flex-col items-center justify-center text-gray-400 cursor-pointer overflow-hidden relative bg-gray-50 dark:bg-gray-800">
                                        {form.photo ? <img src={form.photo} className="w-full h-full object-cover"/> : <><i className="fas fa-camera text-2xl mb-2"></i><span className="text-[10px] font-bold uppercase tracking-wider">FOTO 1 *</span></>}
                                    </div>
                                    <span className="text-[10px] font-black text-center text-gray-500 uppercase">Local da Ronda *</span>
                                </div>
                                <div className="flex flex-col gap-1.5">
                                    <div onClick={()=>fileInputRef2.current.click()} className="w-full h-48 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl flex flex-col items-center justify-center text-gray-400 cursor-pointer overflow-hidden relative bg-gray-50 dark:bg-gray-800">
                                        {form.photo2 ? <img src={form.photo2} className="w-full h-full object-cover"/> : <><i className="fas fa-camera text-2xl mb-2"></i><span className="text-[10px] font-bold uppercase tracking-wider">FOTO 2</span></>}
                                    </div>
                                    <span className="text-[10px] font-black text-center text-gray-500 uppercase">Equipamento/Opcional</span>
                                </div>
                            </div>
                            <input type="file" ref={fileInputRef1} onChange={(e)=>handlePhotoChange(e, 'photo')} className="hidden" accept="image/*" capture="environment" />
                            <input type="file" ref={fileInputRef2} onChange={(e)=>handlePhotoChange(e, 'photo2')} className="hidden" accept="image/*" capture="environment" />
                            
                            <textarea value={form.obs} onChange={e=>setForm({...form, obs:e.target.value})} placeholder="Obs..." className="w-full p-3 bg-gray-100 rounded h-24 mt-4" />
                        </div>
                    </div>
                </div>
            );
        };

        const FormScreen = ({ initialData, onNavigate, onSave, responsibleName, inspectionType, showAlert, subLocationsList, onSaveSubLocation, mainLocationsList, onSaveMainLocation }) => {
             const savedForm = useMemo(() => {
                const saved = localStorage.getItem('trfire_temp_form');
                return saved ? JSON.parse(saved) : null;
             }, []);
             
             const [isSaving, setIsSaving] = useState(false);
             const [form, setForm] = useState(() => {
                 if (initialData && initialData.id) {
                     return { ...initialData }; 
                 }
                 return savedForm || { 
                     type: inspectionType, equipmentId: initialData?.equipmentId, equipmentName: initialData?.equipmentName, 
                     moduleLocation: '', subLocation: '', 
                     hasId: null, floorSign: null, q1: null, q2: null, nextRecharge: '', 
                     h_complete: null, h_unobstructed: null, h_seal_broken: null, nextHydro: '', 
                     spk_placa: null, spk_valvula: null, spk_vazamento: null, spk_chave: null, spk_danos: null, spk_manometro: null,
                     photo: null, photo2: null, obs: '', responsible: responsibleName, created_at: new Date().toISOString(), deleted: false, extinguisherType: '' 
                 };
             });
             
             const fileInputRef1 = useRef(null);
             const fileInputRef2 = useRef(null);

             let labelFoto1 = 'Foto 1 *';
             let labelFoto2 = 'Equipamento';
             
             if (inspectionType === 'EXTINTOR') { labelFoto1 = 'Selo do Inmetro *'; }
             else if (inspectionType === 'HIDRANTE') { labelFoto1 = 'Etiq. de Inspeção *'; }
             else if (inspectionType === 'SPK') { labelFoto1 = 'Válvula Aberta *'; labelFoto2 = 'Conj. Equipamento'; }
             
             const [isAddingSubLoc, setIsAddingSubLoc] = useState(false);
             const [newSubLocName, setNewSubLocName] = useState('');
             const [isSavingSubLoc, setIsSavingSubLoc] = useState(false);

             const [isAddingMainLoc, setIsAddingMainLoc] = useState(false);
             const [newMainLocName, setNewMainLocName] = useState('');
             const [isSavingMainLoc, setIsSavingMainLoc] = useState(false);

             const handleMainLocationChange = (e) => {
                 if (e.target.value === 'ADD_NEW_MAIN') {
                     setNewMainLocName('');
                     setIsAddingMainLoc(true);
                 } else {
                     setForm({...form, moduleLocation: e.target.value, subLocation: ''});
                 }
             };

             const handleSubLocationChange = (e) => {
                 if (e.target.value === 'ADD_NEW') {
                     setNewSubLocName('');
                     setIsAddingSubLoc(true);
                 } else {
                     setForm({...form, subLocation: e.target.value});
                 }
             };

             const saveNewMainLoc = async () => {
                 const nameUpper = newMainLocName.trim().toUpperCase();
                 if (!nameUpper) return showAlert("Digite o nome do local.", "warning");
                 
                 const allCurrentLocs = [...new Set((mainLocationsList || []).map(m => m.name))];
                 if (allCurrentLocs.includes(nameUpper)) {
                     return showAlert("Este local já existe.", "warning");
                 }

                 setIsSavingMainLoc(true);
                 const saved = await onSaveMainLocation(nameUpper);
                 setIsSavingMainLoc(false);
                 if (saved) {
                     setForm({...form, moduleLocation: saved.name, subLocation: ''});
                     setIsAddingMainLoc(false);
                     showAlert("Local principal cadastrado!", "success");
                 } else {
                     showAlert("Erro ao salvar local.", "error");
                 }
             };

             const saveNewSubLoc = async () => {
                 const nameUpper = newSubLocName.trim().toUpperCase();
                 if (!nameUpper) return showAlert("Digite o nome do sublocal.", "warning");
                 
                 if ((subLocationsList || []).some(sl => sl.mainLocation === form.moduleLocation && sl.name === nameUpper)) {
                     return showAlert("Este sublocal já existe neste local.", "warning");
                 }

                 setIsSavingSubLoc(true);
                 const saved = await onSaveSubLocation(form.moduleLocation, nameUpper);
                 setIsSavingSubLoc(false);
                 if (saved) {
                     setForm({...form, subLocation: saved.name});
                     setIsAddingSubLoc(false);
                     showAlert("Sublocal cadastrado!", "success");
                 } else {
                     showAlert("Erro ao salvar sublocal.", "error");
                 }
             };

             const allMainLocs = [...new Set((mainLocationsList || []).map(m => m.name))].sort();
             const filteredSubLocs = (subLocationsList || []).filter(sl => sl.mainLocation === form.moduleLocation).sort((a,b) => a.name.localeCompare(b.name));

             useEffect(() => {
                 localStorage.setItem('trfire_temp_form', JSON.stringify(form));
             }, [form]);

             const handlePhotoChange = (e, field) => { 
                const file = e.target.files[0]; 
                if (file) { 
                    const reader = new FileReader(); 
                    reader.onload = (event) => { 
                        const img = new Image(); 
                        img.onload = () => { 
                            const canvas = document.createElement('canvas'); 
                            const ctx = canvas.getContext('2d'); 
                            
                            const targetWidth = 200; 
                            const targetHeight = 230; 
                            canvas.width = targetWidth; 
                            canvas.height = targetHeight; 
                            
                            const ratio = Math.max(targetWidth / img.width, targetHeight / img.height); 
                            const newWidth = img.width * ratio; 
                            const newHeight = img.height * ratio; 
                            const offsetX = (targetWidth - newWidth) / 2; 
                            const offsetY = (targetHeight - newHeight) / 2; 
                            
                            ctx.drawImage(img, offsetX, offsetY, newWidth, newHeight); 
                            setForm(prev => ({ ...prev, [field]: canvas.toDataURL('image/jpeg', 0.4) })); 
                        }; 
                        img.src = event.target.result; 
                    }; 
                    reader.readAsDataURL(file); 
                } 
             };
             
             const save = async () => { 
                 let missing = [];
                 if (!form.equipmentId) missing.push("ID");
                 if (!form.moduleLocation) missing.push("Local");
                 
                 if (inspectionType === 'EXTINTOR') { 
                     if (form.hasId === null) missing.push("Placa"); if (form.floorSign === null) missing.push("Solo");
                     if (form.q1 === null) missing.push("Lacre"); if (form.q2 === null) missing.push("Obstrução");
                     if (!form.nextRecharge) missing.push("Recarga"); if (!form.nextHydro) missing.push("T. Hidro");
                     if (!form.extinguisherType) missing.push("Tipo");
                 } else if (inspectionType === 'HIDRANTE') { 
                     if (form.h_complete === null) missing.push("Completo"); if (form.h_unobstructed === null) missing.push("Desobstr.");
                     if (form.h_seal_broken === null) missing.push("Lacre"); if (!form.nextHydro) missing.push("T. Hidro");
                 } else if (inspectionType === 'SPK') {
                     if (form.spk_placa === null) missing.push("Placa"); if (form.spk_valvula === null) missing.push("Válvula");
                     if (form.spk_vazamento === null) missing.push("Vazamento"); if (form.spk_chave === null) missing.push("Chave");
                     if (form.spk_danos === null) missing.push("Danos"); if (form.spk_manometro === null) missing.push("Manômetro");
                 }
                 
                 if(missing.length > 0) return showAlert("Falta preencher: " + missing.join(", "), "warning"); 
                 
                 if (!form.id && !form.photo) return showAlert(`⚠️ Registro fotográfico obrigatório (${labelFoto1})!`, "warning");

                 setIsSaving(true); 
                 const success = await onSave(form); 
                 setIsSaving(false);
                 if(success) localStorage.removeItem('trfire_temp_form');
             };

             const handleDateInput = (v) => { v = v.replace(/\D/g, ''); if (v.length > 6) v = v.slice(0, 6); if (v.length >= 2) return v.slice(0, 2) + '/' + v.slice(2); return v; };
             const handleSelectChange = (field, value) => { const boolVal = value === '' ? null : (value === 'true'); setForm(prev => ({...prev, [field]: boolVal})); };

             return (
                <div className="flex flex-col h-full bg-gray-50 dark:bg-black relative">
                    <div className="bg-white dark:bg-gray-900 p-3 shadow-sm flex items-center justify-between sticky top-0 z-20"><button onClick={() => onNavigate('menu')} className="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full"><i className="fas fa-arrow-left"></i></button><h2 className="text-lg font-bold">{inspectionType === 'SPK' ? 'VGA (SPK)' : inspectionType}</h2><button onClick={save} disabled={isSaving} className="bg-blue-500 text-white px-4 py-2 rounded font-bold" type="button">{isSaving ? '...' : 'SALVAR'}</button></div>
                    
                    {isAddingMainLoc && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-2xl w-full max-w-sm shadow-2xl">
                                <h3 className="font-bold mb-1 dark:text-white text-lg">Novo Local Principal</h3>
                                <p className="text-xs text-gray-500 dark:text-gray-400 mb-4">Adicionar à lista mestre</p>
                                <input value={newMainLocName} onChange={e=>setNewMainLocName(e.target.value.toUpperCase())} className="w-full p-4 bg-gray-100 dark:bg-gray-700 dark:text-white rounded-xl mb-4 font-bold border-2 border-transparent focus:border-brand-blue outline-none" placeholder="Ex: GALPÃO 4" />
                                <div className="flex gap-2">
                                    <button onClick={()=>setIsAddingMainLoc(false)} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold active:scale-95">Cancelar</button>
                                    <button onClick={saveNewMainLoc} disabled={isSavingMainLoc} className="flex-1 py-3 bg-brand-blue text-white rounded-xl font-bold active:scale-95">{isSavingMainLoc ? 'Aguarde...' : 'Cadastrar'}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isAddingSubLoc && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-2xl w-full max-w-sm shadow-2xl">
                                <h3 className="font-bold mb-1 dark:text-white text-lg">Novo Sublocal</h3>
                                <p className="text-xs text-gray-500 dark:text-gray-400 mb-4 font-bold uppercase"><i className="fas fa-map-marker-alt mr-1"></i> Pertence a: {form.moduleLocation}</p>
                                <input value={newSubLocName} onChange={e=>setNewSubLocName(e.target.value.toUpperCase())} className="w-full p-4 bg-gray-100 dark:bg-gray-700 dark:text-white rounded-xl mb-4 font-bold border-2 border-transparent focus:border-brand-orange outline-none" placeholder="Ex: CORREDOR 1" />
                                <div className="flex gap-2">
                                    <button onClick={()=>setIsAddingSubLoc(false)} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold active:scale-95">Cancelar</button>
                                    <button onClick={saveNewSubLoc} disabled={isSavingSubLoc} className="flex-1 py-3 bg-brand-orange text-white rounded-xl font-bold active:scale-95">{isSavingSubLoc ? 'Aguarde...' : 'Cadastrar'}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex-1 overflow-y-auto p-2 space-y-4">
                        <div className="bg-white p-4 rounded-xl space-y-4 shadow-sm border border-gray-100 dark:border-gray-800">
                            <input value={form.equipmentName} onChange={e=>setForm({...form, equipmentName:e.target.value})} className="w-full bg-gray-100 p-3 rounded font-bold" placeholder="ID do Equipamento" />
                            
                            <div className={`grid gap-2 ${inspectionType === 'EXTINTOR' ? 'grid-cols-2' : 'grid-cols-1'}`}>
                                <select value={form.moduleLocation} onChange={handleMainLocationChange} className="w-full p-3 bg-gray-100 rounded font-bold outline-none border-2 border-transparent focus:border-brand-orange">
                                    <option value="">Local (Obrigatório)...</option>
                                    <option value="ADD_NEW_MAIN" className="font-black bg-brand-blue text-white">➕ CADASTRAR NOVO LOCAL</option>
                                    {allMainLocs.map(o=><option key={o} value={o}>{o}</option>)}
                                </select>
                                {inspectionType === 'EXTINTOR' && <select value={form.extinguisherType} onChange={e=>setForm({...form, extinguisherType:e.target.value})} className="w-full p-3 bg-gray-100 rounded font-bold"><option value="">Tipo...</option>{EXTINGUISHER_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select>}
                            </div>

                            {form.moduleLocation && (
                                <div className="animate-fade-in border-l-4 border-brand-orange pl-2">
                                    <select value={form.subLocation || ''} onChange={handleSubLocationChange} className="w-full p-3 bg-orange-50 text-brand-orange rounded font-bold border border-orange-200 outline-none">
                                        <option value="">Selecionar Sublocal (Opcional)...</option>
                                        <option value="ADD_NEW" className="font-black bg-brand-orange text-white">➕ CADASTRAR NOVO SUBLOCAL</option>
                                        {filteredSubLocs.map(sl => <option key={sl.id} value={sl.name} className="text-gray-800">{sl.name}</option>)}
                                    </select>
                                </div>
                            )}

                            {inspectionType === 'EXTINTOR' && (<><div className="grid grid-cols-2 gap-2"><ColorSelect label="1. Placa Sinal.?" field="hasId" val={form.hasId} onChange={handleSelectChange} /><ColorSelect label="2. Pintura Solo?" field="floorSign" val={form.floorSign} onChange={handleSelectChange} /></div><div className="grid grid-cols-2 gap-2"><ColorSelect label="3. Lacre Rompido?" field="q1" val={form.q1} onChange={handleSelectChange} invert={true} /><ColorSelect label="4. Obstruído?" field="q2" val={form.q2} onChange={handleSelectChange} invert={true} /></div><div className="grid grid-cols-2 gap-2"><div className="bg-white dark:bg-gray-800 p-3 rounded-xl border border-gray-100 dark:border-gray-700"><label className="text-xs text-gray-500 block mb-1">Próx. Recarga</label><input type="tel" value={form.nextRecharge} onChange={e=>setForm({...form, nextRecharge: handleDateInput(e.target.value)})} placeholder="MMAAAA" className="w-full bg-transparent font-bold dark:text-white"/></div><div className="bg-white dark:bg-gray-800 p-3 rounded-xl border border-gray-100 dark:border-gray-700"><label className="text-xs text-gray-500 block mb-1">Teste Hidro.</label><input type="tel" value={form.nextHydro} onChange={e=>setForm({...form, nextHydro: handleDateInput(e.target.value)})} placeholder="MMAAAA" className="w-full bg-transparent font-bold dark:text-white"/></div></div></>)}
                            
                            {inspectionType === 'HIDRANTE' && (<><div className="grid grid-cols-2 gap-2"><ColorSelect label="1. Completo?" field="h_complete" val={form.h_complete} onChange={handleSelectChange} /><ColorSelect label="2. Desobstruído?" field="h_unobstructed" val={form.h_unobstructed} onChange={handleSelectChange} /></div><div className="grid grid-cols-2 gap-2"><div className="bg-white dark:bg-gray-800 p-3 rounded-xl border border-gray-100 dark:border-gray-700"><label className="text-xs text-gray-500 block mb-1">3. Teste Hidro.</label><input type="tel" value={form.nextHydro} onChange={e=>setForm({...form, nextHydro: handleDateInput(e.target.value)})} placeholder="MMAAAA" className="w-full bg-transparent font-bold dark:text-white"/></div><ColorSelect label="4. Lacre Rompido?" field="h_seal_broken" val={form.h_seal_broken} onChange={handleSelectChange} invert={true} /></div></>)}

                            {inspectionType === 'SPK' && (<><div className="grid grid-cols-2 gap-2"><ColorSelect label="1. Placa Sinal.?" field="spk_placa" val={form.spk_placa} onChange={handleSelectChange} /><ColorSelect label="2. Válvula Lacrada?" field="spk_valvula" val={form.spk_valvula} onChange={handleSelectChange} /></div><div className="grid grid-cols-2 gap-2"><ColorSelect label="3. Tem Vazamento?" field="spk_vazamento" val={form.spk_vazamento} onChange={handleSelectChange} invert={true} /><ColorSelect label="4. Chave Fluxo OK?" field="spk_chave" val={form.spk_chave} onChange={handleSelectChange} /></div><div className="grid grid-cols-2 gap-2"><ColorSelect label="5. Danos Mecânicos?" field="spk_danos" val={form.spk_danos} onChange={handleSelectChange} invert={true} /><ColorSelect label="6. Manômetros OK?" field="spk_manometro" val={form.spk_manometro} onChange={handleSelectChange} /></div></>)}
                            
                            <div className="grid grid-cols-2 gap-3 mt-4">
                                <div className="flex flex-col gap-1.5">
                                    <div onClick={()=>fileInputRef1.current.click()} className="w-full h-48 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl flex flex-col items-center justify-center text-gray-400 cursor-pointer overflow-hidden relative bg-gray-50 dark:bg-gray-800">
                                        {form.photo ? <img src={form.photo} className="w-full h-full object-cover"/> : (form.id && form.hasPhoto && !form.photo) ? <div className="text-center p-2"><i className="fas fa-check-circle text-green-500 text-2xl mb-1"></i><br/><span className="text-[10px] font-bold">MANTIDA NA NUVEM</span></div> : <><i className="fas fa-camera text-2xl mb-2"></i><span className="text-[10px] font-bold uppercase tracking-wider">FOTO 1 *</span></>}
                                    </div>
                                    <span className="text-[10px] font-black text-center text-gray-500 uppercase">{labelFoto1}</span>
                                </div>
                                <div className="flex flex-col gap-1.5">
                                    <div onClick={()=>fileInputRef2.current.click()} className="w-full h-48 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl flex flex-col items-center justify-center text-gray-400 cursor-pointer overflow-hidden relative bg-gray-50 dark:bg-gray-800">
                                        {form.photo2 ? <img src={form.photo2} className="w-full h-full object-cover"/> : (form.id && form.hasPhoto && !form.photo2) ? <div className="text-center p-2"><i className="fas fa-cloud text-blue-400 text-2xl mb-1"></i><br/><span className="text-[10px] font-bold">PODE ESTAR NA NUVEM</span></div> : <><i className="fas fa-camera text-2xl mb-2"></i><span className="text-[10px] font-bold uppercase tracking-wider">FOTO 2</span></>}
                                    </div>
                                    <span className="text-[10px] font-black text-center text-gray-500 uppercase">{labelFoto2}</span>
                                </div>
                            </div>
                            <input type="file" ref={fileInputRef1} onChange={(e)=>handlePhotoChange(e, 'photo')} className="hidden" accept="image/*" capture="environment" />
                            <input type="file" ref={fileInputRef2} onChange={(e)=>handlePhotoChange(e, 'photo2')} className="hidden" accept="image/*" capture="environment" />
                            
                            <textarea value={form.obs} onChange={e=>setForm({...form, obs:e.target.value})} placeholder="Observações (Opcional)..." className="w-full p-4 rounded-xl border-none shadow-sm h-32 resize-none bg-white dark:bg-gray-800 dark:text-white mb-4"></textarea>
                        </div>
                    </div>
                </div>
            );
        };

        const ListScreen = ({ data, onNavigate, onToggleDelete, onDeletePermanently, onImportData, currentUser, showAlert, showConfirm, userRole, onEditItem, onOpenMenu, mainLocationsList }) => {
            const [showFilter, setShowFilter] = useState(false);
            const [showPdfModal, setShowPdfModal] = useState(false); 
            const [showBackupModal, setShowBackupModal] = useState(false);
            const [showBin, setShowBin] = useState(false);
            const [filters, setFilters] = useState({ startDate: '', endDate: '', type: '', responsible: '', moduleLocation: '' });
            const [selectedIds, setSelectedIds] = useState(new Set()); 
            const fileInputRef = useRef(null);
            const [viewMonth, setViewMonth] = useState(new Date().toISOString().slice(0, 7));
            const [pdfMonth, setPdfMonth] = useState(new Date().toISOString().slice(0, 7)); 
            
            const [openMonths, setOpenMonths] = useState({});
            const [openCategories, setOpenCategories] = useState({});
            
            const isAdmin = ['ADMIN', 'SUPERVISOR', 'COORDENADOR'].includes(userRole);

            useEffect(() => { setSelectedIds(new Set()); }, [showBin]);

            const toggleMonth = (m) => setOpenMonths(prev => ({...prev, [m]: !prev[m]}));
            const toggleCategory = (key) => setOpenCategories(prev => ({...prev, [key]: !prev[key]}));

            const formatMonthFolder = (yyyy_mm) => {
                if(!yyyy_mm) return "DATA INVÁLIDA";
                try {
                    const [year, month] = yyyy_mm.split('-');
                    const date = new Date(parseInt(year), parseInt(month) - 1);
                    return date.toLocaleString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase();
                } catch(e) { return yyyy_mm; }
            };

            const deletedData = Array.isArray(data) ? data.filter(item => item.deleted).sort((a,b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)) : [];
            
            const activeData = useMemo(() => {
                if (!Array.isArray(data)) return [];
                return data.filter(item => { 
                    if (item.deleted) return false; 
                    if (!item.created_at) return false; 
                    try {
                        if (filters.startDate && item.created_at.slice(0, 10) < filters.startDate) return false;
                        if (filters.endDate && item.created_at.slice(0, 10) > filters.endDate) return false;
                        if (filters.type && (item.type || 'EXTINTOR') !== filters.type) return false; 
                        if (filters.responsible && item.responsible !== filters.responsible) return false; 
                        if (filters.moduleLocation && item.moduleLocation !== filters.moduleLocation) return false; 
                        return true; 
                    } catch (e) { return false; }
                });
            }, [data, filters]);

            const groupedStructure = useMemo(() => {
                const struct = {};
                activeData.forEach(item => {
                    const monthKey = item.created_at.slice(0, 7); 
                    if (!struct[monthKey]) struct[monthKey] = { EXTINTOR: [], HIDRANTE: [], SPK: [], RONDA: [] };
                    const type = item.type || 'EXTINTOR';
                    if (struct[monthKey][type]) struct[monthKey][type].push(item);
                });
                return struct;
            }, [activeData]);

            const sortedMonths = Object.keys(groupedStructure).sort().reverse();
            const responsibles = useMemo(() => { const unique = new Set(); if (Array.isArray(data)) { data.forEach(item => { if (item && item.responsible) unique.add(item.responsible); }); } return [...unique]; }, [data]);
            const allMainLocs = [...new Set((mainLocationsList || []).map(m => m.name))].sort();
            
            const handleSelectAll = () => { if (showBin) { if (selectedIds.size === deletedData.length) setSelectedIds(new Set()); else setSelectedIds(new Set(deletedData.map(i => i.id))); } else { if (selectedIds.size === activeData.length) setSelectedIds(new Set()); else setSelectedIds(new Set(activeData.map(i => i.id))); } };
            const toggleSelection = (id) => { const newSet = new Set(selectedIds); if (newSet.has(id)) newSet.delete(id); else newSet.add(id); setSelectedIds(newSet); };

            const handleEmptyBin = () => { if (!isAdmin) return showAlert("Apenas Administradores podem esvaziar a lixeira.", "error"); if (deletedData.length === 0) return showAlert("A lixeira já está vazia.", "info"); showConfirm(`ATENÇÃO: Deseja apagar PERMANENTEMENTE todos os ${deletedData.length} itens da lixeira? Esta ação não pode ser desfeita.`, async () => { const promises = deletedData.map(item => onDeletePermanently(item.id)); const results = await Promise.all(promises); const successCount = results.filter(r => r === true).length; const failCount = results.length - successCount; if(failCount > 0) { showAlert(`Atenção: ${successCount} apagados. ${failCount} falharam. Verifique sua conexão.`, "warning"); } else { showAlert("Lixeira esvaziada com sucesso!", "success"); } }, "error"); };
            const confirmBulkRestore = () => { if (selectedIds.size === 0) return; showConfirm(`Restaurar ${selectedIds.size} itens?`, async () => { const promises = Array.from(selectedIds).map(id => onToggleDelete(id, false)); await Promise.all(promises); setSelectedIds(new Set()); showAlert(`${selectedIds.size} itens restaurados!`, "success"); }, "info"); };
            const confirmBulkDelete = () => { if (selectedIds.size === 0) return; showConfirm(`EXCLUIR ${selectedIds.size} itens?`, async () => { const promises = Array.from(selectedIds).map(id => onDeletePermanently(id)); const results = await Promise.all(promises); const success = results.filter(r => r).length; setSelectedIds(new Set()); if(results.length - success > 0) showAlert(`${success} excluídos. Falha em ${results.length - success}.`, "warning"); else showAlert(`${success} itens excluídos!`, "success"); }, "error"); };
            const confirmBulkSoftDelete = () => { if (selectedIds.size === 0) return; showConfirm(`Lixeira: ${selectedIds.size} itens?`, async () => { const promises = Array.from(selectedIds).map(id => onToggleDelete(id, true)); await Promise.all(promises); setSelectedIds(new Set()); showAlert(`${selectedIds.size} items movidos!`, "success"); }, "warning"); };
            const handleExport = () => { const jsonString = JSON.stringify(data, null, 2); const blob = new Blob([jsonString], { type: "application/json" }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `backup_trfire_${new Date().toISOString().slice(0,10)}.json`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); setShowBackupModal(false); };
            const handleFileImport = (e) => { const file = e.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (ev) => { try { const json = JSON.parse(ev.target.result); onImportData(json); setShowBackupModal(false); } catch(err) { showAlert("Erro JSON.", "error"); } }; reader.readAsText(file); e.target.value = null; };
            
            const generateSpecificPDF = async (type) => { 
                if (!isAdmin) { return showAlert("Acesso Negado.", "error"); }
                setShowPdfModal(false); 
                const reportData = activeData.filter(item => { return (item.type || (type === 'RONDA' ? '' : 'EXTINTOR')) === type && item.created_at.slice(0, 7) === pdfMonth; });
                if(reportData.length === 0) return showAlert(`Sem dados de ${type === 'SPK' ? 'VGA (SPK)' : type} em ${formatMonthFolder(pdfMonth)}.`, "warning"); 
                
                const doc = new jsPDF({ orientation: "landscape" }); doc.setFillColor(243, 244, 246); doc.rect(0, 0, 297, 40, 'F'); doc.setTextColor(33, 33, 33); doc.setFontSize(22); 
                
                let title = ""; 
                if (type === 'EXTINTOR') title = "CHECK-LIST EXTINTORES MENSAL"; 
                else if (type === 'HIDRANTE') title = "CHECK-LIST HIDRANTES MENSAL"; 
                else if (type === 'SPK') title = "CHECK-LIST VGA (SPK) MENSAL";
                else if (type === 'RONDA') title = "RELATÓRIO DE RONDAS PREVENTIVAS"; 
                
                doc.text(title, 14, 25); doc.setFontSize(10); doc.setTextColor(100, 100, 100); doc.text(`Mês de Referência: ${formatMonthFolder(pdfMonth)} | Gerado em: ${new Date().toLocaleString('pt-BR')}`, 14, 35); doc.setFontSize(9); doc.setTextColor(33, 33, 33); doc.text("Parque Logístico: AERO GRU I", 280, 28, { align: "right" }); doc.text("Empresa: Vilella Assessoria em Segurança do Trabalho", 280, 35, { align: "right" }); 
                const monthObj = new Date(pdfMonth + '-02'); const monthStr = monthObj.toLocaleString('pt-BR', { month: 'short' }).toUpperCase().replace('.', ''); const yearStr = monthObj.getFullYear(); const typeStr = type === 'EXTINTOR' ? 'Extintores' : (type === 'HIDRANTE' ? 'Hidrantes' : type === 'SPK' ? 'VGA_SPK' : 'Rondas');
