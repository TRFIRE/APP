                                     <div key={monthKey} className="mb-2 bg-white dark:bg-gray-900 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
                                         <button onClick={() => toggleMonth(monthKey)} className="w-full flex justify-between items-center p-4 bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 transition-colors">
                                             <div className="flex items-center gap-3">
                                                 <div className="w-10 h-10 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-white flex items-center justify-center"><i className={`fas ${isOpen ? 'fa-folder-open' : 'fa-folder'}`}></i></div>
                                                 <div className="text-left"><span className="block font-bold text-gray-800 dark:text-white">{formatMonthFolder(monthKey)}</span><span className="text-xs text-gray-500">{count} itens</span></div>
                                             </div>
                                             <i className={`fas fa-chevron-${isOpen ? 'up' : 'down'} text-gray-400`}></i>
                                         </button>
                                         
                                         {isOpen && (
                                             <div className="p-2 bg-white dark:bg-gray-900 space-y-2 animate-fade-in">
                                                 {monthData.EXTINTOR && monthData.EXTINTOR.length > 0 && (<div className="border-l-4 border-brand-red pl-2 ml-2"><button onClick={() => toggleCategory(`${monthKey}-EXT`)} className="w-full flex justify-between items-center py-2 text-brand-red font-bold text-sm"><span><i className="fas fa-fire-extinguisher mr-2"></i>EXTINTORES ({monthData.EXTINTOR.length})</span><i className={`fas fa-chevron-${openCategories[`${monthKey}-EXT`] ? 'up' : 'down'}`}></i></button>{openCategories[`${monthKey}-EXT`] && <div className="space-y-2 mt-1">{monthData.EXTINTOR.map(item => renderItem(item))}</div>}</div>)}
                                                 {monthData.HIDRANTE && monthData.HIDRANTE.length > 0 && (<div className="border-l-4 border-brand-orange pl-2 ml-2"><button onClick={() => toggleCategory(`${monthKey}-HID`)} className="w-full flex justify-between items-center py-2 text-brand-orange font-bold text-sm"><span><HydrantIcon className="mr-2 w-4 h-4 inline" />HIDRANTES ({monthData.HIDRANTE.length})</span><i className={`fas fa-chevron-${openCategories[`${monthKey}-HID`] ? 'up' : 'down'}`}></i></button>{openCategories[`${monthKey}-HID`] && <div className="space-y-2 mt-1">{monthData.HIDRANTE.map(item => renderItem(item))}</div>}</div>)}
                                                 {monthData.SPK && monthData.SPK.length > 0 && (<div className="border-l-4 border-teal-600 pl-2 ml-2"><button onClick={() => toggleCategory(`${monthKey}-SPK`)} className="w-full flex justify-between items-center py-2 text-teal-600 font-bold text-sm"><span><SpkIcon className="mr-2 w-4 h-4 inline" />VGA (SPK) ({monthData.SPK.length})</span><i className={`fas fa-chevron-${openCategories[`${monthKey}-SPK`] ? 'up' : 'down'}`}></i></button>{openCategories[`${monthKey}-SPK`] && <div className="space-y-2 mt-1">{monthData.SPK.map(item => renderItem(item))}</div>}</div>)}
                                                 {monthData.RONDA && monthData.RONDA.length > 0 && (<div className="border-l-4 border-brand-blue pl-2 ml-2"><button onClick={() => toggleCategory(`${monthKey}-RND`)} className="w-full flex justify-between items-center py-2 text-brand-blue font-bold text-sm"><span><i className="fas fa-clipboard-check mr-2"></i>RONDAS ({monthData.RONDA.length})</span><i className={`fas fa-chevron-${openCategories[`${monthKey}-RND`] ? 'up' : 'down'}`}></i></button>{openCategories[`${monthKey}-RND`] && <div className="space-y-2 mt-1">{monthData.RONDA.map(item => renderItem(item))}</div>}</div>)}
                                             </div>
                                         )}
                                     </div>
                                 );
                             })
                        )}
                    </div>
                </div>
            );
        };

        function App() {
            const [page, setPage] = useState(() => {
                const user = localStorage.getItem('trfire_user');
                const storedLastActivity = parseInt(localStorage.getItem('trfire_last_activity') || '0');
                const now = Date.now();
                const TIMEOUT_MS = 10 * 60 * 1000; 

                if (user && (now - storedLastActivity > TIMEOUT_MS)) {
                    localStorage.removeItem('trfire_user');
                    localStorage.removeItem('trfire_unit');
                    localStorage.removeItem('trfire_role');
                    return 'responsible';
                }
                
                return user ? 'menu' : 'responsible';
            });
            const [responsible, setResponsible] = useState(localStorage.getItem('trfire_user') || '');
            const [currentUnit, setCurrentUnit] = useState(localStorage.getItem('trfire_unit') || '');
            const [userRole, setUserRole] = useState(localStorage.getItem('trfire_role') || 'OPERACIONAL'); 
            const [inspectionType, setInspectionType] = useState('EXTINTOR');
            const [roundLocation, setRoundLocation] = useState('');
            const [db, setDb] = useState([]);
            const [users, setUsers] = useState([]);
            const [units, setUnits] = useState([]);
            const [roundLocationsList, setRoundLocationsList] = useState([]); 
            const [subLocationsList, setSubLocationsList] = useState([]); 
            const [mainLocationsList, setMainLocationsList] = useState([]); 
            const [scanRes, setScanRes] = useState(null);
            const [notification, setNotification] = useState({ isOpen: false, message: '', type: 'info', isConfirmation: false, onConfirm: null });
            const [authError, setAuthError] = useState(null);
            const [lastActivity, setLastActivity] = useState(Date.now());
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [loading, setLoading] = useState(true);
            
            const [isOnline, setIsOnline] = useState(typeof navigator !== 'undefined' ? navigator.onLine : true);

            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
            }, []);

            const showAlert = (message, type = 'info', onCloseAction = null) => { setNotification({ isOpen: true, message, type, isConfirmation: false, onConfirm: null, onCloseAction }); };
            const showConfirm = (message, onConfirmAction, type = 'warning') => { setNotification({ isOpen: true, message, type, isConfirmation: true, onConfirm: onConfirmAction }); };
            const closeNotification = () => { if(notification.onCloseAction) notification.onCloseAction(); setNotification({ ...notification, isOpen: false, onCloseAction: null }); };
            const navigateTo = (newPage) => { try { window.history.pushState({ page: newPage }, "", `?page=${newPage}`); } catch (e) { } localStorage.setItem('trfire_current_page', newPage); setPage(newPage); };
            
            useEffect(() => { const h = (e) => { e.preventDefault(); setDeferredPrompt(e); }; window.addEventListener('beforeinstallprompt', h); return () => window.removeEventListener('beforeinstallprompt', h); }, []);
            const handleInstallClick = () => { if (deferredPrompt) { deferredPrompt.prompt(); setDeferredPrompt(null); } else { showAlert("Instale via menu do navegador.", "info"); } };
            useEffect(() => { const h = (e) => { if (e.state && e.state.page) setPage(e.state.page); }; window.addEventListener('popstate', h); return () => window.removeEventListener('popstate', h); }, []);
            useEffect(() => { const savedPage = localStorage.getItem('trfire_current_page'); if (savedPage && savedPage !== 'responsible' && localStorage.getItem('trfire_user')) { setPage(savedPage); } }, []);
            useEffect(() => { if (page === 'responsible') return; const TIMEOUT_MS = 10 * 60 * 1000; const updateActivity = () => { setLastActivity(Date.now()); localStorage.setItem('trfire_last_activity', Date.now().toString()); }; const checkInactivity = () => { const storedLastActivity = parseInt(localStorage.getItem('trfire_last_activity') || Date.now()); if (Date.now() - storedLastActivity > TIMEOUT_MS) { showAlert("Sessão encerrada.", "warning", () => { localStorage.removeItem('trfire_user'); localStorage.removeItem('trfire_role'); window.location.reload(); }); } }; const intervalId = setInterval(checkInactivity, 60000); document.addEventListener("visibilitychange", () => { if(document.visibilityState === 'visible') checkInactivity(); }); const events = ['mousedown', 'mousemove', 'keydown', 'scroll', 'touchstart', 'click']; events.forEach(e => document.addEventListener(e, updateActivity)); updateActivity(); return () => { clearInterval(intervalId); events.forEach(e => document.removeEventListener(e, updateActivity)); }; }, [page]);

            async function checkAndGenerateMissedRounds(currentDb) {
                if (!dbFirestore) return;
                const now = new Date();
                const currentHour = now.getHours();
                const getLocalISODate = (d) => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                let targetRange = null; let shiftId = "";
                if (currentHour >= 6 && currentHour < 12) { let start = new Date(now); start.setHours(0,0,0,0); let end = new Date(now); end.setHours(5,59,59,999); targetRange = { id: `NOTURNO_2_${getLocalISODate(now)}`, start, end }; shiftId = `NOTURNO_2_${getLocalISODate(now)}`; } 
                else if (currentHour >= 12 && currentHour < 18) { let start = new Date(now); start.setHours(6,0,0,0); let end = new Date(now); end.setHours(11,59,59,999); targetRange = { id: `DIURNO_1_${getLocalISODate(now)}`, start, end }; shiftId = `DIURNO_1_${getLocalISODate(now)}`; } 
                else if (currentHour >= 18 && currentHour <= 23) { let start = new Date(now); start.setHours(12,0,0,0); let end = new Date(now); end.setHours(17,59,59,999); targetRange = { id: `DIURNO_2_${getLocalISODate(now)}`, start, end }; shiftId = `DIURNO_2_${getLocalISODate(now)}`; } 
                else { let yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1); let start = new Date(yesterday); start.setHours(18,0,0,0); let end = new Date(yesterday); end.setHours(23,59,59,999); targetRange = { id: `NOTURNO_1_${getLocalISODate(yesterday)}`, start, end }; shiftId = `NOTURNO_1_${getLocalISODate(yesterday)}`; }
                if (!targetRange || now <= targetRange.end) return;
                
                let responsibleName = null;
                let shiftRole = null;
                
                try { 
                    const shiftLogDoc = await dbFirestore.collection("shift_logs").doc(shiftId).get(); 
                    if (shiftLogDoc.exists) { 
                        responsibleName = shiftLogDoc.data().responsible; 
                        shiftRole = shiftLogDoc.data().role; 
                    } else { 
                        return; 
                    } 
                } catch (e) { console.error(e); return; }

                if (!shiftRole && responsibleName) {
                    if (responsibleName.toUpperCase() === 'ADMIN') {
                        shiftRole = 'ADMIN';
                    } else {
                        try {
                            const uQuery = await dbFirestore.collection("users").where("name", "==", responsibleName).limit(1).get();
                            if (!uQuery.empty) { shiftRole = uQuery.docs[0].data().role || 'OPERACIONAL'; }
                        } catch(e) {}
                    }
                }

                const excludedRoles = ['ADMIN', 'SUPERVISOR', 'COORDENADOR'];
                if (shiftRole && excludedRoles.includes(shiftRole.toUpperCase())) {
                    return;
                }

                const locationsToCheck = roundLocationsList.length > 0 ? roundLocationsList.map(l => l.name) : DEFAULT_ROUND_LOCATIONS;
                for (const loc of locationsToCheck) { const hasInspection = currentDb.some(item => { if (item.type !== 'RONDA' || item.deleted || item.sector !== loc) return false; const itemDate = new Date(item.created_at); return itemDate >= targetRange.start && itemDate <= targetRange.end; }); const safeLocId = loc.replace(/[^a-zA-Z0-9]/g, ''); const autoDocId = `AUTO_${targetRange.id}_${safeLocId}`; const alreadyAutoRegistered = currentDb.some(item => item.id === autoDocId); if (!hasInspection && !alreadyAutoRegistered) { try { await dbFirestore.collection("inspections").doc(autoDocId).set({ type: 'RONDA', sector: loc, equipmentName: 'AUDITORIA AUTOMÁTICA', status: 'NÃO REALIZADA', auto: true, obs: `Inspeção não realizada. Turno supervisionado por: ${responsibleName}`, responsible: responsibleName, created_at: targetRange.end.toISOString(), deleted: false }); } catch (e) { console.error(e); } } }
            }
            
            async function checkAndCleanupTrash(currentDb) {
                if (!dbFirestore) return; const now = new Date(); const DELETE_THRESHOLD_MS = 72 * 60 * 60 * 1000; 
                currentDb.forEach(async (item) => { if (item.deleted && item.deleted_at) { const deletedDate = new Date(item.deleted_at); if ((now - deletedDate) > DELETE_THRESHOLD_MS) { try { await dbFirestore.collection("inspections").doc(item.id).delete(); } catch (e) { console.error(e); } } } });
            }
            
            const [firebaseUser, setFirebaseUser] = useState(null);
            useEffect(() => { if(!auth) return; return auth.onAuthStateChanged(user => { if (user) setFirebaseUser(user); else auth.signInAnonymously().catch(setAuthError); }); }, []);
            
            useEffect(() => {
                if(!dbFirestore || !firebaseUser) return;
                setLoading(true);

                dbFirestore.collection("main_locations").get().then(snapshot => {
                    if (snapshot.empty) {
                        const legacyLocations = ["ANJUN", "AZUL CARGO", "AREAS COMUNS", "EQ. RESERVA", "LATAM", "MELI", "POWER SOURCE", "TOTAL EXP."];
                        const batch = dbFirestore.batch();
                        legacyLocations.forEach(loc => {
                            const docRef = dbFirestore.collection("main_locations").doc();
                            batch.set(docRef, { name: loc });
                        });
                        batch.commit().then(() => console.log("Locais nativos migrados com sucesso para o Firebase."));
                    }
                }).catch(err => console.error("Erro na migração de locais:", err));

                const q = dbFirestore.collection("inspections").orderBy("created_at", "desc").limit(10000);
                const unsub1 = q.onSnapshot(s => { 
                    const d=[]; s.forEach(doc=>d.push({id:doc.id,...doc.data()})); 
                    setDb(d); 
                    checkAndGenerateMissedRounds(d); 
                    checkAndCleanupTrash(d); 
                    setLoading(false); 
                }, err => {
                    console.error("Erro ao ler inspeções:", err);
                });
                
                const unsub2 = dbFirestore.collection("users").onSnapshot(s => { const u=[]; s.forEach(doc=>u.push({id:doc.id,...doc.data()})); setUsers(u); const adminUser = u.find(user => user.name === "ADMIN"); if (adminUser && (!adminUser.role || adminUser.role !== "ADMIN")) { dbFirestore.collection("users").doc(adminUser.id).update({ role: "ADMIN", unit: "GLOBAL" }); } }, err => console.error(err));
                const unsub3 = dbFirestore.collection("units").onSnapshot(s => { const u=[]; s.forEach(doc=>u.push({id:doc.id,...doc.data()})); setUnits(u); }, err => console.error(err));
                const unsub4 = dbFirestore.collection("round_locations").orderBy("name").onSnapshot(s => { const l=[]; s.forEach(doc=>l.push({id:doc.id,...doc.data()})); setRoundLocationsList(l); }, err => console.error(err));
                
                const unsub5 = dbFirestore.collection("sub_locations").onSnapshot(s => { 
                    const sl=[]; s.forEach(doc=>sl.push({id:doc.id,...doc.data()})); 
                    setSubLocationsList(sl); 
                }, err => console.error(err));

                const unsub6 = dbFirestore.collection("main_locations").onSnapshot(s => { 
                    const ml=[]; s.forEach(doc=>ml.push({id:doc.id,...doc.data()})); 
                    setMainLocationsList(ml); 
                }, err => console.error(err));
                
                return () => { unsub1(); unsub2(); unsub3(); unsub4(); unsub5(); unsub6(); };
            }, [firebaseUser]);

            const handleSave = async (d) => { 
                try { 
                    const { photo, photo2, id, ...mainData } = d;
                    const hasPhotoFlag = !!photo || !!photo2 || mainData.hasPhoto;
                    
                    let docId = id;
                    
                    if (id) {
                        await dbFirestore.collection("inspections").doc(id).update({...mainData, unit: currentUnit, hasPhoto: hasPhotoFlag});
                    } else {
                        const docRef = await dbFirestore.collection("inspections").add({...mainData, unit: currentUnit, hasPhoto: hasPhotoFlag}); 
                        docId = docRef.id;
                    }
                    
                    if (photo || photo2) {
                        const photoUpdate = {
                            inspectionId: docId,
                            created_at: mainData.created_at,
                            type: mainData.type
                        };
                        if (photo && photo.startsWith('data:image')) photoUpdate.photo = photo;
                        if (photo2 && photo2.startsWith('data:image')) photoUpdate.photo2 = photo2;
                        
                        dbFirestore.collection("inspection_photos").doc(docId).set(photoUpdate, { merge: true }).catch(e => console.error("Sync offline foto:", e));
                    }

                    if (['EXTINTOR', 'HIDRANTE', 'SPK'].includes(d.type)) {
                        setInspectionType(d.type);
                        setPage('equipmentCategory');
                    } else if (d.type === 'RONDA') {
                        setPage('roundsLocation');
                    } else {
                        setPage('list');
                    }
                    return true; 
                } catch(e){ console.error(e); return false; } 
            };
            
            const handleSaveMainLocation = async (locName) => {
                if (!dbFirestore) return null;
                try {
                    const docRef = dbFirestore.collection("main_locations").doc();
                    docRef.set({ name: locName }).catch(e => console.error("Sync offline MainLocal:", e));
                    return { id: docRef.id, name: locName };
                } catch(e) {
                    console.error("Erro ao salvar local principal:", e);
                    return null;
                }
            };

            const handleUpdateMainLocation = async (id, oldName, newName) => {
                if (!dbFirestore) return false;
                try {
                    await dbFirestore.collection("main_locations").doc(id).update({ name: newName });
                    const subLocs = await dbFirestore.collection("sub_locations").where("mainLocation", "==", oldName).get();
                    if (!subLocs.empty) {
                        const batch = dbFirestore.batch();
                        subLocs.forEach(doc => { batch.update(doc.ref, { mainLocation: newName }); });
                        await batch.commit();
                    }
                    return true;
                } catch(e) { console.error(e); return false; }
            };

            const handleDeleteMainLocation = async (id, name) => {
                if (!dbFirestore) return false;
                try {
                    await dbFirestore.collection("main_locations").doc(id).delete();
                    const subLocs = await dbFirestore.collection("sub_locations").where("mainLocation", "==", name).get();
                    if (!subLocs.empty) {
                        const batch = dbFirestore.batch();
                        subLocs.forEach(doc => { batch.delete(doc.ref); });
                        await batch.commit();
                    }
                    return true;
                } catch(e) { console.error(e); return false; }
            };

            const handleSaveSubLocation = async (mainLocation, subLocName) => {
                if (!dbFirestore) return null;
                try {
                    const docRef = dbFirestore.collection("sub_locations").doc();
                    docRef.set({ mainLocation: mainLocation, name: subLocName }).catch(e => console.error("Sync offline SubLocal:", e));
                    return { id: docRef.id, mainLocation, name: subLocName };
                } catch(e) {
                    console.error("Erro ao salvar sublocal:", e);
                    return null;
                }
            };
            
            const handleUpdateSubLocation = async (id, name) => {
                if (!dbFirestore) return false;
                try { dbFirestore.collection("sub_locations").doc(id).update({ name }).catch(e=>console.error(e)); return true; } 
                catch(e) { console.error(e); return false; }
            };
            
            const handleDeleteSubLocation = async (id) => {
                if (!dbFirestore) return false;
                try { dbFirestore.collection("sub_locations").doc(id).delete().catch(e=>console.error(e)); return true; } 
                catch(e) { console.error(e); return false; }
            };
            
            const handleSaveUser = async (d) => { dbFirestore.collection("users").add(d).catch(e=>console.error(e)); return true; };
            const handleUpdateUser = async (id, d) => { dbFirestore.collection("users").doc(id).update(d).catch(e=>console.error(e)); return true; };
            const handleDeleteUser = async (id) => { dbFirestore.collection("users").doc(id).delete().catch(e=>console.error(e)); return true; };
            const handleSaveUnit = async (d) => { dbFirestore.collection("units").add(d).catch(e=>console.error(e)); return true; };
            const handleUpdateUnit = async (id, d) => { dbFirestore.collection("units").doc(id).update(d).catch(e=>console.error(e)); return true; };
            const handleDeleteUnit = async (id) => { dbFirestore.collection("units").doc(id).delete().catch(e=>console.error(e)); return true; };
            const handleSaveRoundLocation = async (d) => { dbFirestore.collection("round_locations").add(d).catch(e=>console.error(e)); return true; };
            const handleUpdateRoundLocation = async (id, d) => { dbFirestore.collection("round_locations").doc(id).update(d).catch(e=>console.error(e)); return true; };
            const handleDeleteRoundLocation = async (id) => { dbFirestore.collection("round_locations").doc(id).delete().catch(e=>console.error(e)); return true; };
            
            const onToggleDelete = async (id, status) => { 
                if(!dbFirestore) return; 
                setDb(prev => prev.map(item => item.id === id ? { ...item, deleted: status, deleted_at: status ? new Date().toISOString() : null } : item));
                try { 
                    const docRef = dbFirestore.collection("inspections").doc(id); 
                    const updateData = { deleted: status };
                    if (status) { updateData.deleted_at = new Date().toISOString(); } else { updateData.deleted_at = null; }
                    docRef.update(updateData).catch(e => console.error(e)); 
                } catch (e) { showAlert("Erro ao atualizar.", "error"); } 
            };
            
            const onDeletePermanently = async (id) => {
                if(!dbFirestore) return false;
                setDb(prev => prev.filter(item => item.id !== id));
                try { 
                    dbFirestore.collection("inspections").doc(id).delete().catch(e => console.error(e)); 
                    dbFirestore.collection("inspection_photos").doc(id).delete().catch(e => console.error(e)); 
                    return true; 
                } catch (e) { showAlert("Erro ao excluir.", "error"); return false; }
            };
            
            const onImportData = (j) => { j.forEach(i=>dbFirestore.collection("inspections").add(i)); };
            
            const handleLogin = (name, unitName, role, showWelcome = true) => { 
                localStorage.setItem('trfire_user', name); 
                localStorage.setItem('trfire_unit', unitName); 
                localStorage.setItem('trfire_role', role); 
                setResponsible(name); 
                setCurrentUnit(unitName); 
                setUserRole(role); 
                setPage('menu'); 

                const excludedRoles = ['ADMIN', 'SUPERVISOR', 'COORDENADOR'];
                if (dbFirestore && !excludedRoles.includes(role.toUpperCase())) {
                    const now = new Date();
                    const currentHour = now.getHours();
                    const getLocalISODate = (d) => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                    let shiftId = "";
                    if (currentHour >= 6 && currentHour < 12) shiftId = `DIURNO_1_${getLocalISODate(now)}`;
                    else if (currentHour >= 12 && currentHour < 18) shiftId = `DIURNO_2_${getLocalISODate(now)}`;
                    else if (currentHour >= 18 && currentHour <= 23) shiftId = `NOTURNO_1_${getLocalISODate(now)}`;
                    else shiftId = `NOTURNO_2_${getLocalISODate(now)}`;
                    
                    dbFirestore.collection("shift_logs").doc(shiftId).set({ responsible: name, role: role, unit: unitName, timestamp: new Date().toISOString() }, { merge: true }).catch(console.error);
                }
            };

            const handleStartInspection = (t) => { 
                localStorage.removeItem('trfire_temp_form');
                localStorage.removeItem('trfire_temp_round');
                setScanRes(null);
                setInspectionType(t); 
                navigateTo('scan'); 
            };
            
            const handleOpenCategory = (t) => {
                setInspectionType(t);
                navigateTo('equipmentCategory');
            }

            const handleRoundStart = (l) => { 
                localStorage.removeItem('trfire_temp_form');
                localStorage.removeItem('trfire_temp_round');
                setScanRes(null);
                setRoundLocation(l); 
                setInspectionType('RONDA'); 
                navigateTo('scan'); 
            };

            const handleEditItem = (item) => {
                setScanRes(item);
                setInspectionType(item.type);
                if (item.type === 'RONDA') {
                    setRoundLocation(item.sector); 
                    navigateTo('roundsForm');
                } else {
                    navigateTo('form');
                }
            };

            if (authError) return <AuthErrorScreen error={authError} />;

            if (loading && !authError) {
                return (
                    <div className="flex flex-col h-screen w-full items-center justify-center bg-gray-100 dark:bg-gray-900">
                        <div className="animate-spin rounded-full h-16 w-16 border-b-4 border-brand-red mb-4"></div>
                        <p className="text-brand-orange font-bold tracking-widest animate-pulse">A CONECTAR...</p>
                    </div>
                );
            }

            return (
                <ErrorBoundary>
                    {!isOnline && page !== 'responsible' && (
                        <div className="bg-red-600 text-white text-[10px] font-black tracking-widest text-center py-2 z-[200] relative shadow-md flex justify-center items-center gap-2 w-full uppercase animate-fade-in">
                            <i className="fas fa-wifi-slash text-sm"></i> 
                            <span>Modo Offline - Sinc. em Segundo Plano</span>
                        </div>
                    )}
                
                    <SidebarMenu 
                        isOpen={isMenuOpen} 
                        onClose={() => setIsMenuOpen(false)} 
                        onNavigate={navigateTo} 
                        responsibleName={responsible} 
                        currentUnit={currentUnit} 
                        userRole={userRole} 
                        usersList={users} 
                        unitsList={units}
                        onOpenCategory={handleOpenCategory} 
                        onStartInspection={handleStartInspection} 
                    />

                    <NotificationModal isOpen={notification.isOpen} message={notification.message} type={notification.type} isConfirmation={notification.isConfirmation} onClose={closeNotification} onConfirm={notification.onConfirm} />
                    
                    {page === 'responsible' && <ResponsibleScreen onConfirm={handleLogin} usersList={users} unitsList={units} showAlert={showAlert} onNavigate={navigateTo} isOnline={isOnline} />}
                    {page === 'menu' && <DashboardScreen db={db} onOpenMenu={() => setIsMenuOpen(true)} responsibleName={responsible} onNavigate={navigateTo} onStartInspection={handleStartInspection} onOpenCategory={handleOpenCategory} />}
                    {page === 'adminMenu' && <AdminMenuScreen onNavigate={navigateTo} onOpenMenu={() => setIsMenuOpen(true)} />}
                    {page === 'accessControl' && <AccessControlScreen onNavigate={navigateTo} usersList={users} onUpdatePermissions={(id,p)=>dbFirestore.collection("users").doc(id).update({permissions:p})} />}
                    
                    {page === 'equipmentCategory' && <EquipmentCategoryScreen db={db} inspectionType={inspectionType} onNavigate={navigateTo} onStartScan={handleStartInspection} currentUser={responsible} userRole={userRole} onEditItem={handleEditItem} onToggleDelete={onToggleDelete} showConfirm={showConfirm} />}

                    {page === 'roundsLocation' && <RoundsLocationScreen onNavigate={navigateTo} onSelectLocation={handleRoundStart} db={db} responsibleName={responsible} roundLocationsList={roundLocationsList} onOpenMenu={() => setIsMenuOpen(true)} />}
                    {page === 'userRegister' && <UserRegisterScreen onNavigate={navigateTo} onSaveUser={handleSaveUser} usersList={users} unitsList={units} onUpdateUser={handleUpdateUser} onDeleteUser={handleDeleteUser} showAlert={showAlert} showConfirm={showConfirm} />}
                    {page === 'unitRegister' && <UnitRegisterScreen onNavigate={navigateTo} onSaveUnit={handleSaveUnit} unitsList={units} onUpdateUnit={handleUpdateUnit} onDeleteUnit={handleDeleteUnit} showAlert={showAlert} showConfirm={showConfirm} />}
                    
                    {page === 'roundLocRegister' && <RoundLocationsRegisterScreen onNavigate={navigateTo} onSaveLocation={handleSaveRoundLocation} onUpdateLocation={handleUpdateRoundLocation} locationsList={roundLocationsList} onDeleteLocation={handleDeleteRoundLocation} showAlert={showAlert} showConfirm={showConfirm} />}
                    {page === 'subLocRegister' && <SubLocationsRegisterScreen onNavigate={navigateTo} subLocationsList={subLocationsList} onUpdateSubLocation={handleUpdateSubLocation} onDeleteSubLocation={handleDeleteSubLocation} showAlert={showAlert} showConfirm={showConfirm} mainLocationsList={mainLocationsList} onUpdateMainLocation={handleUpdateMainLocation} onDeleteMainLocation={handleDeleteMainLocation} />}
                    
                    {page === 'scan' && <ScannerScreen onNavigate={(t) => {
                         let nextPage = t;
                         if (t === 'menu') {
                             if (inspectionType === 'RONDA') nextPage = 'roundsLocation';
                             else if (['EXTINTOR', 'HIDRANTE', 'SPK'].includes(inspectionType)) nextPage = 'equipmentCategory';
                         }
                         navigateTo(nextPage);
                    }} onScanSuccess={(d)=>{setScanRes(d); navigateTo(inspectionType === 'RONDA' ? 'roundsForm' : 'form')}} db={db} inspectionType={inspectionType} showAlert={showAlert} />}
                    
                    {page === 'form' && <FormScreen initialData={scanRes} onNavigate={(t) => {
                        if (t === 'menu') navigateTo('equipmentCategory');
                        else navigateTo(t);
                    }} responsibleName={responsible} onSave={handleSave} inspectionType={inspectionType} showAlert={showAlert} subLocationsList={subLocationsList} onSaveSubLocation={handleSaveSubLocation} mainLocationsList={mainLocationsList} onSaveMainLocation={handleSaveMainLocation} />}
                    
                    {page === 'roundsForm' && <RoundsFormScreen initialData={scanRes} onNavigate={navigateTo} responsibleName={responsible} roundLocation={roundLocation} onSave={handleSave} currentUnit={currentUnit} showAlert={showAlert} />}
                    {page === 'list' && <ListScreen data={db} onNavigate={navigateTo} onToggleDelete={onToggleDelete} onDeletePermanently={onDeletePermanently} onImportData={onImportData} currentUser={responsible} userRole={userRole} showAlert={showAlert} showConfirm={showConfirm} onEditItem={handleEditItem} onOpenMenu={() => setIsMenuOpen(true)} mainLocationsList={mainLocationsList} />}
                    {page === 'adminSetup' && <UserRegisterScreen onNavigate={navigateTo} onSaveUser={handleSaveUser} usersList={users} unitsList={units} onUpdateUser={handleUpdateUser} onDeleteUser={handleDeleteUser} showAlert={showAlert} showConfirm={showConfirm} backDestination="responsible" />}
                </ErrorBoundary>
            );
        }

        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        } else {
            console.error("ERRO CRÍTICO: Elemento #root não encontrado no DOM.");
        }
    </script>
</body>
</html>
