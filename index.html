        const formatDate = (dateStr) => { 
            if (!dateStr) return '-'; 
            try { return new Date(dateStr).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
            catch(e) { return '-'; }
        };

        const checkExpiration = (dateStr) => {
            if (!dateStr) return 'OK';
            let clean = dateStr.replace(/\D/g, '');
            if (clean.length < 6) return 'OK';
            let month = parseInt(clean.slice(0, 2), 10);
            let year = parseInt(clean.slice(2, 6), 10);
            if (isNaN(month) || isNaN(year)) return 'OK';
            
            let expDate = new Date(year, month, 0, 23, 59, 59);
            let now = new Date();
            
            if (now > expDate) return 'VENCIDO';
            
            let diffTime = expDate - now;
            let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays <= 30) return 'A_VENCER';
            return 'OK';
        }

        const SpkIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="currentColor" className={className || "w-full h-full"}>
                <path d="M 22 24 H 78 V 30 H 22 V 24 Z" />

                <path d="M 28 30 H 34 L 44 43 V 48 H 36 L 28 36 V 30 Z" />

                    <path d="M 50 60 C 50 60 45 70 45 74 C 45 76.8 47.2 79 50 79 C 52.8 79 55 76.8 55 74 C 55 70 50 60 50 60 Z" />
                </g>
                <g transform="translate(14, 4) rotate(-15 50 60)">
                    <path d="M 50 60 C 50 60 45 70 45 74 C 45 76.8 47.2 79 50 79 C 52.8 79 55 76.8 55 74 C 55 70 50 60 50 60 Z" />
                </g>
                <g transform="translate(-28, 10) rotate(30 50 60)">
                    <path d="M 50 60 C 50 60 45 70 45 74 C 45 76.8 47.2 79 50 79 C 52.8 79 55 76.8 55 74 C 55 70 50 60 50 60 Z" />
                </g>
                <g transform="translate(28, 10) rotate(-30 50 60)">
                    <path d="M 50 60 C 50 60 45 70 45 74 C 45 76.8 47.2 79 50 79 C 52.8 79 55 76.8 55 74 C 55 70 50 60 50 60 Z" />

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) return <div className="flex flex-col items-center justify-center h-screen bg-red-50 p-6 text-center text-red-800 font-bold">Algo correu mal.<br/>Reinicie o app.</div>;
                return this.props.children;
            }
        }

        function NotificationModal({ isOpen, message, type, isConfirmation, onClose, onConfirm }) {
            if (!isOpen) return null;
            const colors = { error: 'bg-red-500', success: 'bg-green-500', warning: 'bg-yellow-500', info: 'bg-blue-500', welcome: 'bg-brand-orange' };
            const icon = { error: 'fa-times', success: 'fa-check', warning: 'fa-exclamation', info: 'fa-info', welcome: 'fa-user-check' };
            return (
                <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white dark:bg-gray-800 p-6 rounded-3xl w-full max-w-sm text-center shadow-2xl border border-gray-100 dark:border-gray-700">
                        <div className={`w-16 h-16 rounded-full ${colors[type] || colors.info} flex items-center justify-center mx-auto mb-4 shadow-lg`}><i className={`fas ${icon[type] || icon.info} text-3xl text-white`}></i></div>
                        <h3 className="text-xl font-black text-gray-800 dark:text-white mb-2 uppercase">{isConfirmation ? 'Confirmação' : (type === 'welcome' ? 'Bem-vindo!' : (type === 'error' ? 'Atenção' : 'Sucesso'))}</h3>
                        <p className="text-gray-600 dark:text-gray-300 mb-6 text-sm font-medium leading-relaxed whitespace-pre-line">{message}</p>
                        <div className="flex gap-3 justify-center">
                            {isConfirmation && <button onClick={onClose} className="flex-1 py-3 rounded-xl bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 font-bold active:scale-95">Cancelar</button>}
                            <button onClick={() => { if (isConfirmation && onConfirm) onConfirm(); onClose(); }} className={`flex-1 py-3 rounded-xl text-white font-bold shadow-lg active:scale-95 ${colors[type] || colors.info}`}>{isConfirmation ? 'Confirmar' : 'Entendido'}</button>
                        </div>
                    </div>
                </div>
            );
        }

        function AuthErrorScreen({ error }) {
            return (
                <div className="flex flex-col h-full bg-red-50 p-6 items-center justify-center text-center">
                    <i className="fas fa-lock text-3xl text-red-600 mb-4"></i>
                    <h2 className="text-2xl font-bold text-red-800 mb-2">Acesso Bloqueado</h2>
                    <p className="text-sm text-gray-700 mb-4">{error.message}</p>
                    <button onClick={() => window.location.reload()} className="mt-4 px-6 py-3 bg-red-600 text-white rounded-lg font-bold shadow-md">Tentar Novamente</button>
                </div>
            );
        }

        function ColorSelect({ label, val, field, onChange, invert=false }) { 
            let bgClass = "bg-white dark:bg-gray-800"; let textClass = "text-gray-700 dark:text-gray-200"; 
            if(val === true) { bgClass = invert ? "bg-red-100 dark:bg-red-900 border-red-500" : "bg-green-100 dark:bg-green-900 border-green-500"; textClass = invert ? "text-red-700 dark:text-red-100" : "text-green-700 dark:text-green-100"; } 
            else if(val === false) { bgClass = invert ? "bg-green-100 dark:bg-green-900 border-green-500" : "bg-red-100 dark:bg-red-900 border-red-500"; textClass = invert ? "text-green-700 dark:text-green-100" : "text-red-700 dark:text-red-100"; } 
            return (
                <div className={`p-3 rounded-xl border ${val !== null ? 'border-2' : 'border-gray-200 dark:border-gray-700'} ${bgClass} shadow-sm transition-colors w-full`}>
                    <p className={`font-bold mb-1 text-xs ${val !== null ? textClass : 'text-gray-500 dark:text-gray-400'}`}>{label}</p>
                    <select value={val === null ? '' : (val ? 'true' : 'false')} onChange={(e) => onChange(field, e.target.value)} className={`w-full bg-transparent font-bold focus:outline-none ${textClass} appearance-none`}>
                        <option value="">Selecionar...</option><option value="true">Sim</option><option value="false">Não</option>
                    </select>
                </div>
            ); 
        }

        function ResponsibleScreen({ onConfirm, usersList, unitsList, showAlert, onNavigate, isOnline }) {
            const [selectedName, setSelectedName] = useState("");
            const [selectedUnit, setSelectedUnit] = useState("");
            const [password, setPassword] = useState("");
            const [showPassword, setShowPassword] = useState(false);
            const [lastTap, setLastTap] = useState(0);

            const handleLogoTap = () => {
                const now = Date.now();
                if (now - lastTap < 400) { onNavigate('adminSetup'); } 
                setLastTap(now);
            };

            const handleLoginAttempt = () => {
                const nameUpper = selectedName.toUpperCase().trim();
                if (!nameUpper || !password) return; 
                
                if (!usersList || usersList.length === 0) { showAlert("A carregar usuários... Tente novamente.", "info"); return; }
                const userFound = usersList.find(u => u.name === nameUpper);
                if (!userFound) { showAlert("Usuário não cadastrado.", "error"); return; }
                if (userFound.pass !== password) { showAlert("Senha incorreta.", "error"); return; }
                
                const role = userFound.role || (userFound.name === 'ADMIN' ? 'ADMIN' : 'OPERACIONAL');
                const isSuperUser = ['ADMIN', 'SUPERVISOR', 'COORDENADOR'].includes(role);

                if (!isSuperUser && !selectedUnit) { showAlert("Selecione uma Unidade.", "warning"); return; }
                if (!isSuperUser && userFound.unit !== "GLOBAL" && userFound.unit !== selectedUnit) { showAlert("Usuário incorreto.", "error"); return; }
                
                onConfirm(userFound.name, selectedUnit || "GLOBAL", role, true);
            };
            const isButtonEnabled = selectedName && password;

            return (
                <div className="flex flex-col h-full bg-brand-red p-4 items-center justify-center animate-fade-in relative overflow-hidden">
                    <div onClick={handleLogoTap} className="w-28 h-28 mb-2 bg-white rounded-full p-4 shadow-2xl flex items-center justify-center cursor-pointer active:scale-95 transition-transform"><LogoImage className="w-full h-full object-contain" /></div>
                    <h1 className="text-white text-2xl font-extrabold tracking-tight mb-1 text-center">TR FIRE <span className="text-brand-orange">INSPEÇÕES</span></h1>
                    <p className="text-white/80 text-xs mb-2 font-medium">Sistema de Controle de Equipamentos</p>
                    
                    <div className={`flex items-center gap-2 mb-4 px-3 py-1 rounded-full ${isOnline ? 'bg-black/20' : 'bg-red-900/60 border border-red-500/50 shadow-inner'}`}>
                        <div className={`w-2 h-2 rounded-full animate-pulse ${isOnline ? 'bg-green-400' : 'bg-red-500'}`}></div>
                        <p className="text-white/90 text-[10px] font-black uppercase tracking-wider">{isOnline ? 'ONLINE' : 'OFFLINE (Sinc. Pendente)'}</p>
                    </div>

                    <div className="bg-white dark:bg-gray-900 p-6 rounded-2xl shadow-2xl w-full max-w-sm space-y-4 mt-6">
                        <div><label className="text-xs font-bold text-gray-700 dark:text-gray-300 block mb-1">Unidade</label><div className="relative"><select value={selectedUnit} onChange={(e) => { setSelectedUnit(e.target.value); }} className="w-full p-3 bg-gray-100 dark:bg-gray-800 rounded-xl border-2 border-gray-200 dark:border-gray-700 focus:border-brand-orange outline-none dark:text-white appearance-none font-bold text-gray-700 text-base"><option value="">{unitsList && unitsList.length > 0 ? "Selecione..." : "A carregar..."}</option>{unitsList && unitsList.map(u => <option key={u.id} value={u.name}>{u.name}</option>)}</select></div></div>
                        <div><label className="text-xs font-bold text-gray-700 dark:text-gray-300 block mb-1">Responsável</label><div className="relative"><input type="text" value={selectedName} onChange={(e) => setSelectedName(e.target.value.toUpperCase())} placeholder="Digite seu nome..." className="w-full p-3 bg-gray-100 dark:bg-gray-800 rounded-xl border-2 border-gray-200 dark:border-gray-700 focus:border-brand-orange outline-none dark:text-white font-bold text-gray-700 text-base"/></div></div>
                        <div><label className="text-xs font-bold text-gray-700 dark:text-gray-300 block mb-1">Senha</label><div className="relative"><input type={showPassword ? "text" : "password"} value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Digite sua senha..." className="w-full p-3 bg-gray-100 dark:bg-gray-800 rounded-xl border-2 border-gray-200 dark:border-gray-700 focus:border-brand-orange outline-none dark:text-white font-bold text-gray-700 text-base pr-12" /><button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 flex items-center px-4 text-gray-400"><i className={`fas ${showPassword ? 'fa-eye-slash' : 'fa-eye'}`}></i></button></div></div>
                        <button onClick={handleLoginAttempt} disabled={!isButtonEnabled} className={`w-full py-4 rounded-xl text-lg font-bold shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2 ${isButtonEnabled ? 'bg-brand-orange hover:bg-orange-600 text-white' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}>INICIAR INSPEÇÃO <i className="fas fa-arrow-right"></i></button>
                    </div>
                    <div className="absolute bottom-2 w-full text-center space-y-1"><div className="text-white/90 text-[10px] text-center mb-0.5 leading-tight font-medium"><p>Copyright © 2026 Fire Personality ME</p><p>Todos os direitos reservados</p><p>(Thawillys Rocha)</p></div><p className="text-white/40 text-[10px]">Versão Beta 1.5</p></div>
                </div>
            );
        }

        function SidebarMenu({ isOpen, onClose, onNavigate, responsibleName, currentUnit, userRole, usersList, unitsList, onOpenCategory }) {
            if (!isOpen) return null;
            
            const isAdmin = ['ADMIN', 'SUPERVISOR', 'COORDENADOR'].includes(userRole);
            const userPerms = usersList?.find(u => u.name === responsibleName)?.permissions || ['EXTINTOR', 'HIDRANTE', 'SPK', 'HISTORICO'];
            
            const unitObj = unitsList?.find(u => u.name === currentUnit);
            const unitModules = unitObj?.modules || ['EXTINTOR', 'HIDRANTE', 'SPK', 'RONDA'];

            const hasAccess = (perm) => {
                const userHasPerm = isAdmin || userPerms.includes(perm);
                const unitHasPerm = currentUnit === 'GLOBAL' || unitModules.includes(perm);
                if (['EXTINTOR', 'HIDRANTE', 'SPK', 'RONDA'].includes(perm)) {
                    return userHasPerm && unitHasPerm;
                }
                return userHasPerm;
            };
            
            const handleNav = (target, type = null) => {
                onClose();
                if (type) {
                    onOpenCategory(type);
                } else {
                    onNavigate(target);
                }
            };
            
            const handleLogout = () => { localStorage.removeItem('trfire_user'); localStorage.removeItem('trfire_role'); window.location.reload(); };

            return (
                <div className="fixed inset-0 z-[100] flex">
                    <div className="absolute inset-0 bg-black/60 transition-opacity animate-fade-in" onClick={onClose}></div>
                    
                    <div className="relative w-[85%] max-w-sm bg-white dark:bg-gray-900 h-full shadow-2xl flex flex-col animate-slide-in-left">
                        <div className="bg-brand-red p-6 text-white flex flex-col justify-end min-h-[160px] relative">
                            <button onClick={onClose} className="absolute top-4 right-4 text-white/80 hover:text-white text-2xl"><i className="fas fa-times"></i></button>
                            <div className="w-16 h-16 bg-white rounded-full p-2 mb-3 shadow"><LogoImage className="w-full h-full object-contain" /></div>
                            <h2 className="text-xl font-black">TR FIRE</h2>
                            <p className="text-sm font-bold opacity-90 mt-1">{responsibleName}</p>
                            <p className="text-[10px] opacity-75">{currentUnit} | {userRole}</p>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto py-4 space-y-1 px-3">
                            <button onClick={()=>handleNav('menu')} className="w-full flex items-center p-3 text-left text-gray-700 dark:text-gray-200 font-bold hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors">
                                <div className="w-10 flex justify-center"><i className="fas fa-chart-pie text-brand-orange text-lg"></i></div> Dashboard

                            {(hasAccess('RONDA') || hasAccess('EXTINTOR') || hasAccess('HIDRANTE') || hasAccess('SPK')) && (

                                    <p className="text-[10px] font-black text-gray-400 dark:text-gray-500 uppercase tracking-widest">Módulos</p>

                            )}

                            {hasAccess('RONDA') && (
                                <button onClick={()=>handleNav('roundsLocation')} className="w-full flex items-center p-3 text-left text-gray-700 dark:text-gray-200 font-bold hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors">
                                    <div className="w-10 flex justify-center"><i className="fas fa-clipboard-check text-brand-blue text-lg"></i></div> Ronda Diária
                                </button>
                            )}
                            
                            {hasAccess('EXTINTOR') && (
                                <button onClick={()=>handleNav('equipmentCategory', 'EXTINTOR')} className="w-full flex items-center p-3 text-left text-gray-700 dark:text-gray-200 font-bold hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors">
                                    <div className="w-10 flex justify-center"><i className="fas fa-fire-extinguisher text-brand-red text-lg"></i></div> Extintores
                                </button>
                            )}
                            
                            {hasAccess('HIDRANTE') && (
                                <button onClick={()=>handleNav('equipmentCategory', 'HIDRANTE')} className="w-full flex items-center p-3 text-left text-gray-700 dark:text-gray-200 font-bold hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors">
                                    <div className="w-10 flex justify-center"><HydrantIcon className="text-brand-orange text-lg w-5 h-5 inline" /></div> Hidrantes
                                </button>
                            )}
                            
                            {hasAccess('SPK') && (
                                <button onClick={()=>handleNav('equipmentCategory', 'SPK')} className="w-full flex items-center p-3 text-left text-gray-700 dark:text-gray-200 font-bold hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors">
                                    <div className="w-10 flex justify-center"><SpkIcon className="text-teal-600 text-lg w-5 h-5 inline" /></div> VGA (SPK)
                                </button>
                            )}

                            {(hasAccess('HISTORICO') || isAdmin) && (
                                <div className="pt-4 pb-2 px-3 mt-2 border-t border-gray-100 dark:border-gray-800">
                                    <p className="text-[10px] font-black text-gray-400 dark:text-gray-500 uppercase tracking-widest">Gestão</p>
                                </div>
                            )}

                            {hasAccess('HISTORICO') && (
                                <button onClick={()=>handleNav('list')} className="w-full flex items-center p-3 text-left text-gray-700 dark:text-gray-200 font-bold hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors">
                                    <div className="w-10 flex justify-center"><i className="fas fa-history text-gray-500 text-lg"></i></div> Histórico Geral
                                </button>
                            )}
                            
                            {isAdmin && (
                                <button onClick={()=>handleNav('adminMenu')} className="w-full flex items-center p-3 text-left text-gray-700 dark:text-gray-200 font-bold hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors">
                                    <div className="w-10 flex justify-center"><i className="fas fa-cogs text-cyan-600 text-lg"></i></div> Parâmetros Admin
                                </button>

                        <div className="p-4 border-t border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-900">
                            <button onClick={handleLogout} className="w-full flex items-center justify-center p-3 text-red-600 font-bold hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-colors">

        function DashboardScreen({ db, onOpenMenu, responsibleName, onNavigate, onStartInspection, onOpenCategory }) {
            const currentMonth = new Date().toISOString().slice(0, 7);
            const todayStr = new Date().toISOString().slice(0, 10);
            
            const inspecionadosMes = useMemo(() => {
                return db.filter(item => !item.deleted && item.created_at?.startsWith(currentMonth));
            }, [db, currentMonth]);

            const countExtMes = inspecionadosMes.filter(i => i.type === 'EXTINTOR').length;
            const countHidMes = inspecionadosMes.filter(i => i.type === 'HIDRANTE').length;
            const countSpkMes = inspecionadosMes.filter(i => i.type === 'SPK').length;
            const countRondaMes = inspecionadosMes.filter(i => i.type === 'RONDA').length;
            
            const rondasHoje = db.filter(item => !item.deleted && item.type === 'RONDA' && item.created_at?.startsWith(todayStr)).length;

            const stats = useMemo(() => {
                const latestEquipments = {};
                db.filter(item => !item.deleted && item.type !== 'RONDA' && item.equipmentId).forEach(item => {
                    if (!latestEquipments[item.equipmentId] || new Date(item.created_at) > new Date(latestEquipments[item.equipmentId].created_at)) {
                        latestEquipments[item.equipmentId] = item;
                    }
                });

                let countOk = 0;
                let countVencido = 0;
                let countAVencer = 0;
                let alertsList = [];

                Object.values(latestEquipments).forEach(eq => {
                    let finalStatus = 'OK';
                    
                    if (eq.type === 'EXTINTOR' || eq.type === 'HIDRANTE') {
                        let stRecharge = eq.type === 'EXTINTOR' ? checkExpiration(eq.nextRecharge) : 'OK';
                        let stHydro = checkExpiration(eq.nextHydro);
                        
                        if (stRecharge === 'VENCIDO' || stHydro === 'VENCIDO') finalStatus = 'VENCIDO';
                        else if (stRecharge === 'A_VENCER' || stHydro === 'A_VENCER') finalStatus = 'A_VENCER';
                    } else if (eq.type === 'SPK') {
                        finalStatus = 'OK';
                    }

                    if (finalStatus === 'OK') countOk++;
                    else if (finalStatus === 'VENCIDO') { 
                        countVencido++; 
                        alertsList.push({...eq, alertType: 'VENCIDO'}); 
                    }
                    else if (finalStatus === 'A_VENCER') { 
                        countAVencer++; 
                        alertsList.push({...eq, alertType: 'A_VENCER'}); 
                    }
                });

                alertsList.sort((a,b) => {
                    if (a.alertType === 'VENCIDO' && b.alertType !== 'VENCIDO') return -1;
                    if (b.alertType === 'VENCIDO' && a.alertType !== 'VENCIDO') return 1;
                    return 0;
                });

                return { countOk, countVencido, countAVencer, alerts: alertsList, total: countOk + countVencido + countAVencer };
            }, [db]);

            const pctOk = stats.total ? (stats.countOk / stats.total) * 100 : 0;
            const pctAVencer = stats.total ? (stats.countAVencer / stats.total) * 100 : 0;
            const pctVencido = stats.total ? (stats.countVencido / stats.total) * 100 : 0;

            const currentHour = new Date().getHours();
            const shiftName = currentHour >= 6 && currentHour < 18 ? "TURNO DIURNO" : "TURNO NOTURNO";

            return (
                <div className="flex flex-col h-full bg-gray-50 dark:bg-brand-dark overflow-y-auto animate-fade-in relative pb-10">
                    <div className="bg-brand-red p-4 flex justify-between items-center text-white sticky top-0 z-20 shadow-md">
                        <button onClick={onOpenMenu} className="w-10 h-10 flex items-center justify-start text-2xl active:scale-90 transition-transform"><i className="fas fa-bars"></i></button>
                        <h1 className="font-black text-lg tracking-tight">DASHBOARD</h1>
                        <div className="w-10"></div>
                    </div>
                    
                    <div className="p-4 space-y-6">
                        <div className="flex justify-between items-end">
                            <div>
                                <p className="text-gray-500 dark:text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">Bem-vindo(a) de volta,</p>
                                <h2 className="text-xl font-black text-gray-800 dark:text-white truncate max-w-[200px]">{responsibleName}</h2>
                            </div>
                            <div className="text-right">
                                <span className="inline-block bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300 text-[10px] px-2 py-1 rounded-lg font-black uppercase tracking-widest border border-blue-200 dark:border-blue-800">
                                    {shiftName}
                                </span>
                            </div>
                        </div>

                        <div>
                            <p className="text-[10px] font-black text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-3">Acesso Rápido</p>
                            <div className="grid grid-cols-2 gap-3">
                                <button onClick={() => onOpenCategory('EXTINTOR')} className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 flex items-center gap-3 active:scale-95 transition-transform">
                                    <div className="w-10 h-10 rounded-full bg-red-50 dark:bg-red-900/20 text-brand-red flex items-center justify-center text-lg"><i className="fas fa-fire-extinguisher"></i></div>
                                    <span className="text-xs font-bold text-gray-700 dark:text-gray-300">Extintores</span>
                                </button>
                                <button onClick={() => onOpenCategory('HIDRANTE')} className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 flex items-center gap-3 active:scale-95 transition-transform">
                                    <div className="w-10 h-10 rounded-full bg-orange-50 dark:bg-orange-900/20 text-brand-orange flex items-center justify-center text-lg"><HydrantIcon className="w-5 h-5 inline" /></div>
                                    <span className="text-xs font-bold text-gray-700 dark:text-gray-300">Hidrantes</span>
                                </button>
                                <button onClick={() => onOpenCategory('SPK')} className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 flex items-center gap-3 active:scale-95 transition-transform">
                                    <div className="w-10 h-10 rounded-full bg-teal-50 dark:bg-teal-900/20 text-teal-600 flex items-center justify-center text-lg"><SpkIcon className="w-6 h-6 inline" /></div>
                                    <span className="text-xs font-bold text-gray-700 dark:text-gray-300">VGA (SPK)</span>
                                </button>
                                <button onClick={() => onNavigate('roundsLocation')} className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 flex items-center gap-3 active:scale-95 transition-transform">
                                    <div className="w-10 h-10 rounded-full bg-blue-50 dark:bg-blue-900/20 text-brand-blue flex items-center justify-center text-lg"><i className="fas fa-clipboard-check"></i></div>
                                    <span className="text-xs font-bold text-gray-700 dark:text-gray-300">Rondas</span>
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-gradient-to-br from-gray-800 to-gray-900 rounded-3xl p-5 shadow-lg flex flex-col justify-between relative overflow-hidden">
                                <i className="fas fa-chart-line absolute -right-4 -bottom-4 text-6xl text-white/5"></i>
                                <div>
                                    <p className="text-white/60 text-[10px] font-bold uppercase tracking-widest mb-1">Mês Atual</p>
                                    <h2 className="text-4xl font-black text-white">{inspecionadosMes.length}</h2>
                                    <p className="text-white/80 text-[10px] font-medium mt-1">
                                        <i className="fas fa-fire-extinguisher text-brand-red mr-1"></i> {countExtMes} &nbsp;
                                        <HydrantIcon className="text-brand-orange mx-1 w-3 h-3 inline" /> {countHidMes} &nbsp;
                                        <SpkIcon className="text-teal-400 mx-1 w-3 h-3 inline" /> {countSpkMes}
                                    </p>
                                </div>
                            </div>
                            
                            <div className="bg-white dark:bg-gray-800 rounded-3xl p-5 shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col justify-center items-center text-center">
                                <div className="w-12 h-12 rounded-full bg-blue-50 dark:bg-blue-900/20 text-brand-blue flex items-center justify-center text-xl mb-2">
                                    <i className="fas fa-walking"></i>
                                </div>
                                <h2 className="text-3xl font-black text-gray-800 dark:text-white">{rondasHoje}</h2>
                                <p className="text-gray-500 dark:text-gray-400 text-[10px] font-bold uppercase tracking-widest mt-1">Rondas Realizadas Hoje</p>
                            </div>
                        </div>
                        
                        <div className="bg-white dark:bg-gray-800 rounded-3xl p-6 shadow-sm border border-gray-100 dark:border-gray-700">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-gray-800 dark:text-white text-sm font-black uppercase tracking-wide">Saúde dos Equipamentos</h3>
                                <span className="text-[10px] font-bold bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded text-gray-600 dark:text-gray-300">{stats.total} Ativos</span>
                            </div>
                            
                            <div className="flex h-4 rounded-full overflow-hidden mb-5 bg-gray-100 dark:bg-gray-700 shadow-inner">
                                {pctOk > 0 && <div style={{width: `${pctOk}%`}} className="bg-green-500 hover:opacity-80 transition-opacity"></div>}
                                {pctAVencer > 0 && <div style={{width: `${pctAVencer}%`}} className="bg-yellow-400 hover:opacity-80 transition-opacity"></div>}
                                {pctVencido > 0 && <div style={{width: `${pctVencido}%`}} className="bg-red-500 hover:opacity-80 transition-opacity"></div>}
                                {stats.total === 0 && <div className="w-full bg-gray-200 dark:bg-gray-600"></div>}
                            </div>
                            
                            <div className="grid grid-cols-3 gap-2 text-center">
                                <div className="bg-green-50 dark:bg-green-900/10 py-3 rounded-xl border border-green-100 dark:border-green-900/30">
                                    <p className="text-[9px] text-green-700 dark:text-green-500 font-black uppercase mb-0.5 tracking-wider">OK</p>
                                    <p className="text-green-600 font-black text-xl">{stats.countOk}</p>
                                </div>
                                <div className="bg-yellow-50 dark:bg-yellow-900/10 py-3 rounded-xl border border-yellow-100 dark:border-yellow-900/30">
                                    <p className="text-[9px] text-yellow-700 dark:text-yellow-500 font-black uppercase mb-0.5 tracking-wider">A Vencer</p>
                                    <p className="text-yellow-600 font-black text-xl">{stats.countAVencer}</p>
                                </div>
                                <div className="bg-red-50 dark:bg-red-900/10 py-3 rounded-xl border border-red-100 dark:border-red-900/30">
                                    <p className="text-[9px] text-red-700 dark:text-red-500 font-black uppercase mb-0.5 tracking-wider">Vencidos</p>
                                    <p className="text-red-600 font-black text-xl">{stats.countVencido}</p>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <div className="flex items-center justify-between mb-3 px-1">
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 rounded-full bg-brand-orange/10 flex items-center justify-center text-brand-orange">
                                        <i className="fas fa-bell"></i>
                                    </div>
                                    <h3 className="text-gray-800 dark:text-white font-black text-sm uppercase tracking-wide">Atenção Necessária</h3>
                                </div>
                                <span className="text-[10px] font-bold text-gray-400">{stats.alerts.length} alertas</span>
                            </div>
                            
                            <div className="space-y-3">
                                {stats.alerts.length === 0 ? (
                                    <div className="bg-gray-50 dark:bg-gray-800/50 rounded-2xl p-6 text-center border border-dashed border-gray-300 dark:border-gray-600">
                                        <i className="fas fa-shield-alt text-3xl text-green-400 mb-2 opacity-50"></i>
                                        <p className="text-gray-500 dark:text-gray-400 text-sm font-bold">Tudo em ordem!</p>
                                        <p className="text-xs text-gray-400">Nenhum equipamento próximo do vencimento.</p>
                                    </div>
                                ) : stats.alerts.map((eq, idx) => (
                                    <div key={idx} className={`p-4 rounded-2xl shadow-sm bg-white dark:bg-gray-800 border-l-4 flex justify-between items-center transition-all ${eq.alertType === 'VENCIDO' ? 'border-red-500' : 'border-yellow-400'}`}>
                                        <div className="flex gap-3 items-center">
                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center ${eq.alertType === 'VENCIDO' ? 'bg-red-50 text-red-500' : 'bg-yellow-50 text-yellow-600'}`}>
                                                {eq.type === 'EXTINTOR' && <i className="fas fa-fire-extinguisher"></i>}
                                                {eq.type === 'HIDRANTE' && <HydrantIcon className="w-5 h-5 inline" />}
                                                {eq.type === 'SPK' && <SpkIcon className="w-5 h-5 inline" />}
                                            </div>
                                            <div>
                                                <p className="font-bold text-sm text-gray-800 dark:text-white">{eq.equipmentName}</p>
                                                <p className="text-[10px] text-gray-500 uppercase font-bold mt-0.5"><i className="fas fa-map-marker-alt mr-1"></i> {eq.moduleLocation || 'LOCAL NÃO INFORMADO'} {eq.subLocation ? ` - ${eq.subLocation}` : ''}</p>
                                            </div>
                                        </div>
                                        <span className={`text-[9px] font-black px-2 py-1.5 rounded-lg uppercase tracking-wider ${eq.alertType === 'VENCIDO' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'}`}>
                                            {eq.alertType === 'VENCIDO' ? 'VENCIDO' : 'A VENCER'}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            )
        }

        function EquipmentCategoryScreen({ db, inspectionType, onNavigate, onStartScan, currentUser, userRole, onEditItem, onToggleDelete, showConfirm }) {
            const isAdmin = ['ADMIN', 'SUPERVISOR', 'COORDENADOR'].includes(userRole);
            const [openMonths, setOpenMonths] = useState({});

            const toggleMonth = (m) => setOpenMonths(prev => ({...prev, [m]: !prev[m]}));

            const formatMonthFolder = (yyyy_mm) => {
                if(!yyyy_mm) return "DATA INVÁLIDA";
                try {
                    const [year, month] = yyyy_mm.split('-');
                    const date = new Date(parseInt(year), parseInt(month) - 1);
                    return date.toLocaleString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase();
                } catch(e) { return yyyy_mm; }
            };

            const activeData = useMemo(() => {
                if (!Array.isArray(db)) return [];
                return db.filter(item => !item.deleted && item.type === inspectionType);
            }, [db, inspectionType]);

            const groupedStructure = useMemo(() => {
                const struct = {};
                activeData.forEach(item => {
                    const monthKey = item.created_at ? item.created_at.slice(0, 7) : 'UNKNOWN'; 
                    if (!struct[monthKey]) struct[monthKey] = [];
                    struct[monthKey].push(item);
                });
                return struct;
            }, [activeData]);

            const sortedMonths = Object.keys(groupedStructure).sort().reverse();

            useEffect(() => {
                if (sortedMonths.length > 0 && Object.keys(openMonths).length === 0) {
                    setOpenMonths({ [sortedMonths[0]]: true });
                }
            }, [sortedMonths]);

            let bgColorClass = 'bg-brand-red';
            let textColorClass = 'text-brand-red';
            let lightBgClass = 'bg-red-50 text-brand-red';
            let borderLightClass = 'border-brand-red';
            let title = 'Extintores';
            let IconComp = () => <i className="fas fa-fire-extinguisher mr-2"></i>;

            if (inspectionType === 'HIDRANTE') {
               bgColorClass = 'bg-brand-orange';
               textColorClass = 'text-brand-orange';
               lightBgClass = 'bg-orange-50 text-brand-orange';
               borderLightClass = 'border-brand-orange';
               title = 'Hidrantes';
               IconComp = () => <HydrantIcon className="mr-2 w-5 h-5 inline" />;
            } else if (inspectionType === 'SPK') {
               bgColorClass = 'bg-teal-600';
               textColorClass = 'text-teal-600';
               lightBgClass = 'bg-teal-50 text-teal-600';
               borderLightClass = 'border-teal-500';
               title = 'VGA (SPK)';
               IconComp = () => <SpkIcon className="mr-2 w-5 h-5 inline" />;
            }

            const renderItem = (item) => {
                let statusColor = 'bg-gray-100 text-gray-700';
                let statusText = '---';
                
                if (item.type === 'HIDRANTE') { 
                    statusColor = (item.h_complete && item.h_unobstructed && !item.h_seal_broken) ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'; 
                    statusText = (item.h_complete && item.h_unobstructed && !item.h_seal_broken) ? 'OK' : 'IRREGULAR'; 
                } else if (item.type === 'SPK') {
                    const isSpkOk = item.spk_placa && item.spk_valvula && !item.spk_vazamento && item.spk_chave && !item.spk_danos && item.spk_manometro;
                    statusColor = isSpkOk ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
                    statusText = isSpkOk ? 'OK' : 'IRREGULAR';
                } else { 
                    statusColor = (!item.q1 && !item.q2) ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'; 
                    statusText = (!item.q1) ? 'OK' : 'VIOLADO'; 
                }
                
                const canDelete = isAdmin || (item.responsible === currentUser);

                return (
                    <div key={item.id} className={`p-4 rounded-xl shadow-sm border-l-4 ${borderLightClass} flex justify-between items-center transition-all mb-2 bg-white dark:bg-gray-800`}>
                        <div className="flex items-center gap-3">
                            <div>
                                <span className="font-bold text-sm block dark:text-white">{item.equipmentName}</span>
                                <span className="text-xs text-gray-500 font-bold block mt-0.5">{formatDate(item.created_at)} | {item.responsible}</span>
                                <span className="text-[10px] text-gray-400 font-bold block mt-0.5"><i className="fas fa-map-marker-alt mr-1"></i> {item.moduleLocation || 'LOCAL NÃO INFORMADO'} {item.subLocation ? ` - ${item.subLocation}` : ''}</span>
                            </div>
                            {item.hasPhoto && <div className="text-[10px] text-gray-400 bg-gray-100 dark:bg-gray-700 px-1 rounded flex items-center gap-1"><i className="fas fa-camera"></i></div>}
                        </div>
                        <div className="flex flex-col items-end gap-2">
                            <div className="flex items-center gap-2">
                                <span className={`inline-block text-[10px] px-2 py-0.5 rounded font-bold ${statusColor}`}>{statusText}</span>
                                {isAdmin && (
                                    <button onClick={(e) => { e.stopPropagation(); onEditItem(item); }} className="w-8 h-8 flex items-center justify-center text-blue-500 hover:text-blue-700 transition-colors">
                                        <i className="fas fa-pen"></i>
                                    </button>
                                )}
                            </div>
                            {canDelete && <i onClick={() => showConfirm("Mover para lixeira?", () => onToggleDelete(item.id, true), "warning")} className="fas fa-trash text-red-300 cursor-pointer mt-1"></i>}
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full bg-gray-50 dark:bg-brand-dark relative animate-fade-in">
                    <div className={`${bgColorClass} p-4 flex justify-between items-center text-white sticky top-0 z-20 shadow-md`}>
                        <button onClick={() => onNavigate('menu')} className="w-10 h-10 flex items-center justify-start text-xl active:scale-90 transition-transform"><i className="fas fa-arrow-left"></i></button>
                        <h1 className="font-black text-lg tracking-tight uppercase flex items-center"><IconComp /> {title}</h1>
                        <div className="w-10"></div>
                    </div>
                    
                    <div className="p-4 bg-white dark:bg-gray-900 shadow-sm z-10">
                        <button onClick={() => onStartScan(inspectionType)} className={`w-full py-4 ${bgColorClass} text-white rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-3`}>
                            <i className="fas fa-qrcode text-2xl"></i> NOVA LEITURA
                        </button>
                    </div>

                    <div className="flex-1 overflow-y-auto px-4 pb-4 space-y-2 mt-2">
                        <h3 className="text-gray-500 dark:text-gray-400 text-xs font-bold uppercase tracking-wider mb-2">Histórico Recente ({activeData.length})</h3>
                        {sortedMonths.length === 0 ? <div className="text-center text-gray-500 mt-10">Nenhum registro encontrado.</div> : 
                            sortedMonths.map(monthKey => {
                                const isOpen = openMonths[monthKey] !== false; 
                                const monthData = groupedStructure[monthKey];
                                
                                return (
                                    <div key={monthKey} className="mb-2 bg-white dark:bg-gray-900 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
                                        <button onClick={() => toggleMonth(monthKey)} className="w-full flex justify-between items-center p-4 bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 transition-colors">
                                            <div className="flex items-center gap-3">
                                                <div className={`w-10 h-10 rounded-full ${lightBgClass} flex items-center justify-center`}><i className={`fas ${isOpen ? 'fa-folder-open' : 'fa-folder'}`}></i></div>
                                                <div className="text-left"><span className="block font-bold text-gray-800 dark:text-white">{formatMonthFolder(monthKey)}</span><span className="text-xs text-gray-500">{monthData.length} itens</span></div>
                                            </div>
                                            <i className={`fas fa-chevron-${isOpen ? 'up' : 'down'} text-gray-400`}></i>
                                        </button>
                                        
                                        {isOpen && (
                                            <div className="p-2 bg-white dark:bg-gray-900 space-y-2 animate-fade-in">
                                                {monthData.map(item => renderItem(item))}
                                            </div>
                                        )}
                                    </div>
                                );
                            })
                        }
                    </div>
                </div>
            );
        }

        function RoundLocationsRegisterScreen({ onNavigate, onSaveLocation, onUpdateLocation, locationsList, onDeleteLocation, showAlert, showConfirm, onOpenMenu }) {
            const [newLocation, setNewLocation] = useState("");
            const [saving, setSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);

            const handleSave = async () => {
                if (!newLocation) return showAlert("Digite o nome do local.", "warning");
                setSaving(true);
                if (editingId) { await onUpdateLocation(editingId, { name: newLocation.toUpperCase() }); showAlert("Atualizado!", "success"); setEditingId(null); } 
                else { await onSaveLocation({ name: newLocation.toUpperCase() }); showAlert("Adicionado!", "success"); }
                setSaving(false); setNewLocation("");
            };

            const handleEditClick = (loc) => { setEditingId(loc.id); setNewLocation(loc.name); };
            const handleCancelEdit = () => { setEditingId(null); setNewLocation(""); };
            const handleDelete = (id) => { showConfirm("Excluir este local?", () => onDeleteLocation(id), "error"); };

            return (
                <div className="flex flex-col h-full bg-white dark:bg-brand-dark p-4 overflow-y-auto relative">
                    <div className="absolute top-4 left-4"><button onClick={() => onNavigate('adminMenu')} className="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-white shadow-sm"><i className="fas fa-arrow-left"></i></button></div>
                    <div className="mt-16 text-center mb-8"><div className="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-full mb-4"><i className="fas fa-map-marker-alt text-2xl text-white"></i></div><h2 className="text-2xl font-black text-gray-800 dark:text-white uppercase">{editingId ? 'EDITAR LOCAL' : 'LOCAIS DE RONDA'}</h2><p className="text-gray-500 dark:text-gray-400 text-sm">Gerenciar pontos</p></div>
                    <div className="space-y-4"><input value={newLocation} onChange={e => setNewLocation(e.target.value)} placeholder="NOME DO LOCAL" className="w-full p-4 bg-gray-100 dark:bg-gray-800 rounded-xl border-2 border-gray-200 dark:border-gray-700 focus:border-brand-blue outline-none dark:text-white font-bold text-gray-700 uppercase" /><div className="flex gap-2">{editingId && <button onClick={handleCancelEdit} className="flex-1 py-4 bg-gray-300 text-gray-700 rounded-xl font-bold shadow-lg">CANCELAR</button>}<button onClick={handleSave} disabled={saving} className="flex-[2] py-4 bg-brand-blue text-white rounded-xl text-lg font-bold shadow-lg active:scale-95 transition-transform">{saving ? '...' : (editingId ? 'ATUALIZAR' : 'ADICIONAR')}</button></div></div>
                    <div className="mt-8 pt-6 border-t border-gray-200 dark:border-gray-700"><h3 className="font-bold text-gray-500 mb-4 text-xs uppercase">Locais Cadastrados ({locationsList.length})</h3><div className="space-y-2">{locationsList.map(loc => (<div key={loc.id} className={`bg-white dark:bg-gray-900 border ${editingId === loc.id ? 'border-blue-500 bg-blue-50' : 'border-gray-200'} p-4 rounded-xl flex items-center justify-between shadow-sm`}><span className="font-bold text-gray-800 dark:text-white text-sm">{loc.name}</span><div className="flex gap-2"><button onClick={() => handleEditClick(loc)} className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center hover:bg-blue-200"><i className="fas fa-pen text-xs"></i></button><button onClick={() => handleDelete(loc.id)} className="w-8 h-8 rounded-full bg-red-100 text-red-600 flex items-center justify-center hover:bg-red-200"><i className="fas fa-trash text-xs"></i></button></div></div>))}</div></div>
                </div>
            );
        };

        function SubLocationsRegisterScreen({ onNavigate, subLocationsList, onUpdateSubLocation, onDeleteSubLocation, showAlert, showConfirm, mainLocationsList, onUpdateMainLocation, onDeleteMainLocation }) {
            const [selectedMainLocation, setSelectedMainLocation] = useState("");
            const [editingId, setEditingId] = useState(null);
            const [subLocName, setSubLocName] = useState("");
            const [saving, setSaving] = useState(false);

            const [editingMainId, setEditingMainId] = useState(null);
            const [newMainName, setNewMainName] = useState("");

            const handleSelectMainLoc = (e) => {
                setSelectedMainLocation(e.target.value);
                setEditingId(null);
                setEditingMainId(null);
            };

            const selectedMainLocObj = (mainLocationsList || []).find(m => m.name === selectedMainLocation);

            const handleSave = async () => {
                if (!subLocName.trim()) return showAlert("Digite o nome do sublocal.", "warning");
                setSaving(true);
                if (editingId) {
                    await onUpdateSubLocation(editingId, subLocName.trim().toUpperCase());
                    showAlert("Sublocal atualizado!", "success");
                    setEditingId(null);
                    setSubLocName("");
                }
                setSaving(false);
            };

            const handleEditClick = (sl) => {
                setEditingId(sl.id);
                setSubLocName(sl.name);
            };

            const handleCancelEdit = () => {
                setEditingId(null);
                setSubLocName("");
            };

            const handleDelete = (id) => {
                showConfirm("Tem certeza que deseja excluir este sublocal?", () => onDeleteSubLocation(id), "error");
            };

            const handleEditMainClick = () => {
                setEditingMainId(selectedMainLocObj.id);
                setNewMainName(selectedMainLocObj.name);
            };

            const handleSaveMainEdit = async () => {
                if (!newMainName.trim()) return showAlert("Digite o novo nome.", "warning");
                setSaving(true);
                const success = await onUpdateMainLocation(editingMainId, selectedMainLocation, newMainName.trim().toUpperCase());
                setSaving(false);
                if (success) {
                    showAlert("Local atualizado com sucesso!", "success");
                    setSelectedMainLocation(newMainName.trim().toUpperCase());
                    setEditingMainId(null);
                } else {
                    showAlert("Erro ao atualizar local.", "error");
                }
            };

            const handleDeleteMain = () => {
                showConfirm("EXCLUIR LOCAL E TODOS OS SEUS SUBLOCAIS? Esta ação não pode ser desfeita.", async () => {
                    const success = await onDeleteMainLocation(selectedMainLocObj.id, selectedMainLocation);
                    if (success) {
                        showAlert("Local excluído!", "success");
                        setSelectedMainLocation("");
                    } else {
                        showAlert("Erro ao excluir.", "error");
                    }
                }, "error");
            };

            const filteredList = (subLocationsList || []).filter(sl => sl.mainLocation === selectedMainLocation).sort((a,b) => a.name.localeCompare(b.name));
            const allMainLocs = [...new Set((mainLocationsList || []).map(m => m.name))].sort();

            return (
                <div className="flex flex-col h-full bg-white dark:bg-brand-dark p-4 overflow-y-auto relative animate-fade-in">
                    <div className="absolute top-4 left-4"><button onClick={() => onNavigate('adminMenu')} className="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-white shadow-sm"><i className="fas fa-arrow-left"></i></button></div>
                    
                    <div className="mt-16 text-center mb-8">
                        <div className="inline-flex items-center justify-center w-16 h-16 bg-teal-600 rounded-full mb-4"><i className="fas fa-layer-group text-2xl text-white"></i></div>
                        <h2 className="text-2xl font-black text-gray-800 dark:text-white uppercase">LOCAIS E SUBLOCAIS</h2>
                        <p className="text-gray-500 dark:text-gray-400 text-sm">Editar ou remover cadastros</p>
                    </div>

                    <div className="space-y-4">
                        <select value={selectedMainLocation} onChange={handleSelectMainLoc} className="w-full p-4 bg-gray-100 dark:bg-gray-800 rounded-xl border-2 border-gray-200 dark:border-gray-700 focus:border-brand-orange outline-none dark:text-white font-bold text-gray-700 uppercase">
                            <option value="">Selecione o Local Principal...</option>
                            {allMainLocs.map(o => <option key={o} value={o}>{o}</option>)}
                        </select>

                        {selectedMainLocation && !editingId && !editingMainId && (
                            <div className="p-4 bg-teal-50 dark:bg-teal-900/10 border-2 border-teal-200 dark:border-teal-800 rounded-xl flex justify-between items-center shadow-sm">
                                <div>
                                    <span className="text-[10px] font-black text-teal-600 uppercase block mb-1 tracking-widest">Local Selecionado</span>
                                    <span className="font-black text-gray-800 dark:text-white block text-lg">{selectedMainLocation}</span>
                                </div>
                                {selectedMainLocObj ? (
                                    <div className="flex gap-2">
                                        <button onClick={handleEditMainClick} className="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center hover:bg-blue-200 shadow-sm"><i className="fas fa-edit"></i></button>
                                        <button onClick={handleDeleteMain} className="w-10 h-10 rounded-full bg-red-100 text-red-600 flex items-center justify-center hover:bg-red-200 shadow-sm"><i className="fas fa-trash"></i></button>
                                    </div>
                                ) : (
                                    <span className="text-[9px] bg-gray-200 dark:bg-gray-700 text-gray-500 dark:text-gray-400 px-2 py-1 rounded font-black uppercase tracking-wider text-center max-w-[80px]">Padrão do Sistema</span>
                                )}
                            </div>
                        )}

                        {editingMainId && (
                            <div className="animate-fade-in p-4 bg-blue-50 dark:bg-blue-900/20 border border-blue-400 rounded-xl space-y-3">
                                <label className="text-xs font-bold text-blue-600 uppercase">Editando Local Principal</label>
                                <input value={newMainName} onChange={e => setNewMainName(e.target.value)} placeholder="NOVO NOME DO LOCAL" className="w-full p-3 bg-white dark:bg-gray-800 rounded-xl border-2 border-gray-200 dark:border-gray-700 focus:border-blue-500 outline-none dark:text-white font-bold text-gray-700 uppercase" />
                                <div className="flex gap-2">
                                    <button onClick={() => setEditingMainId(null)} className="flex-1 py-3 bg-gray-300 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-xl font-bold shadow-sm">CANCELAR</button>
                                    <button onClick={handleSaveMainEdit} disabled={saving} className="flex-[2] py-3 bg-blue-600 text-white rounded-xl font-bold shadow-sm active:scale-95 transition-transform">{saving ? '...' : 'SALVAR ALTERAÇÃO'}</button>
                                </div>
                            </div>
                        )}

                        {editingId && (
                            <div className="animate-fade-in p-4 bg-orange-50 dark:bg-orange-900/20 border border-brand-orange rounded-xl space-y-3">
                                <label className="text-xs font-bold text-brand-orange uppercase">Editando Sublocal</label>
                                <input value={subLocName} onChange={e => setSubLocName(e.target.value)} placeholder="NOME DO SUBLOCAL" className="w-full p-3 bg-white dark:bg-gray-800 rounded-xl border-2 border-gray-200 dark:border-gray-700 focus:border-brand-orange outline-none dark:text-white font-bold text-gray-700 uppercase" />
                                <div className="flex gap-2">
                                    <button onClick={handleCancelEdit} className="flex-1 py-3 bg-gray-300 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-xl font-bold shadow-sm">CANCELAR</button>
                                    <button onClick={handleSave} disabled={saving} className="flex-[2] py-3 bg-brand-orange text-white rounded-xl font-bold shadow-sm active:scale-95 transition-transform">{saving ? '...' : 'SALVAR ALTERAÇÃO'}</button>
                                </div>
                            </div>
                        )}
                    </div>

                    {selectedMainLocation && !editingId && !editingMainId && (
                        <div className="mt-8 pt-6 border-t border-gray-200 dark:border-gray-700 animate-fade-in">
                            <h3 className="font-bold text-gray-500 mb-4 text-xs uppercase">Sublocais de {selectedMainLocation} ({filteredList.length})</h3>
                            {filteredList.length === 0 ? (
                                <p className="text-sm text-gray-400 text-center py-4">Nenhum sublocal vinculado a este local.</p>
                            ) : (
                                <div className="space-y-2">
                                    {filteredList.map(sl => (
                                        <div key={sl.id} className="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 p-4 rounded-xl flex items-center justify-between shadow-sm">
                                            <span className="font-bold text-gray-800 dark:text-white text-sm">{sl.name}</span>
                                            <div className="flex gap-2">
                                                <button onClick={() => handleEditClick(sl)} className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center hover:bg-blue-200"><i className="fas fa-pen text-xs"></i></button>
                                                <button onClick={() => handleDelete(sl.id)} className="w-8 h-8 rounded-full bg-red-100 text-red-600 flex items-center justify-center hover:bg-red-200"><i className="fas fa-trash text-xs"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        function UnitRegisterScreen({ onNavigate, onSaveUnit, unitsList, onUpdateUnit, onDeleteUnit, showAlert, showConfirm }) {
            const [newUnit, setNewUnit] = useState({ name: '', address: '', modules: ['EXTINTOR', 'HIDRANTE', 'SPK', 'RONDA'] });
            const [editingId, setEditingId] = useState(null);

            const toggleModule = (mod) => {
                setNewUnit(prev => {
                    const mods = prev.modules || [];
                    return { ...prev, modules: mods.includes(mod) ? mods.filter(m => m !== mod) : [...mods, mod] };
                });
            };

            const handleSave = async () => {
                if (!newUnit.name) return showAlert("Preencha nome.", "warning");
                if (editingId) { await onUpdateUnit(editingId, newUnit); setEditingId(null); showAlert("Atualizado!", "success"); } 
                else { await onSaveUnit(newUnit); showAlert("Cadastrado!", "success"); }
                setNewUnit({ name: '', address: '', modules: ['EXTINTOR', 'HIDRANTE', 'SPK', 'RONDA'] });
            };
            const handleEditClick = (u) => { setEditingId(u.id); setNewUnit({ name: u.name, address: u.address, modules: u.modules || ['EXTINTOR', 'HIDRANTE', 'SPK', 'RONDA'] }); };
            
            return (
                <div className="flex flex-col h-full bg-white dark:bg-brand-dark p-4 overflow-y-auto">
                    <div className="absolute top-4 left-4"><button onClick={() => onNavigate('adminMenu')} className="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-white shadow-sm"><i className="fas fa-arrow-left"></i></button></div>
                    
                    <div className="mt-16 space-y-4">
                        <input value={newUnit.name} onChange={e => setNewUnit({...newUnit, name: e.target.value.toUpperCase()})} placeholder="NOME DA UNIDADE" className="w-full p-4 bg-gray-100 dark:bg-gray-800 border-2 border-transparent focus:border-brand-orange outline-none dark:text-white rounded-xl font-bold" />
                        <input value={newUnit.address} onChange={e => setNewUnit({...newUnit, address: e.target.value})} placeholder="ENDEREÇO" className="w-full p-4 bg-gray-100 dark:bg-gray-800 border-2 border-transparent focus:border-brand-orange outline-none dark:text-white rounded-xl font-bold" />
                        
                        <div className="bg-gray-50 dark:bg-gray-800 p-4 rounded-xl border border-gray-200 dark:border-gray-700">
                            <label className="text-[10px] font-black text-gray-500 dark:text-gray-400 mb-3 block uppercase tracking-wider">Módulos Permitidos na Unidade</label>
                            <div className="space-y-2">
                                {['EXTINTOR', 'HIDRANTE', 'SPK', 'RONDA'].map(mod => (
                                    <label key={mod} className="flex items-center justify-between bg-white dark:bg-gray-900 p-4 rounded-xl shadow-sm cursor-pointer border border-gray-100 dark:border-gray-700 active:scale-95 transition-transform">
                                        <div className="flex items-center gap-3">
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center ${mod === 'EXTINTOR' ? 'bg-red-50 text-red-500' : mod === 'HIDRANTE' ? 'bg-orange-50 text-orange-500' : mod === 'SPK' ? 'bg-teal-50 text-teal-600' : 'bg-blue-50 text-blue-500'}`}>
                                                {mod === 'EXTINTOR' && <i className="fas fa-fire-extinguisher"></i>}
                                                {mod === 'HIDRANTE' && <HydrantIcon className="w-4 h-4 inline" />}
                                                {mod === 'SPK' && <SpkIcon className="w-4 h-4 inline" />}
                                                {mod === 'RONDA' && <i className="fas fa-clipboard-check"></i>}
                                            </div>
                                            <span className="font-bold text-gray-700 dark:text-gray-200 text-sm">{mod === 'RONDA' ? 'Ronda Diária' : (mod === 'EXTINTOR' ? 'Extintores' : mod === 'SPK' ? 'VGA (SPK)' : 'Hidrantes')}</span>
                                        </div>
                                        <input type="checkbox" checked={newUnit.modules?.includes(mod)} onChange={() => toggleModule(mod)} className="w-5 h-5 text-brand-orange rounded border-gray-300 focus:ring-brand-orange bg-gray-100 dark:bg-gray-800" />
                                    </label>
                                ))}
                            </div>
                        </div>

                        <button onClick={handleSave} className="w-full py-4 bg-brand-orange text-white rounded-xl font-bold shadow-lg active:scale-95 transition-transform">SALVAR</button>
                    </div>

                    <div className="mt-8 pt-6 border-t border-gray-200 dark:border-gray-700 space-y-3">
                        <h3 className="font-bold text-gray-500 mb-4 text-xs uppercase">Unidades Cadastradas ({unitsList.length})</h3>
                        {unitsList && unitsList.map(u => (
                            <div key={u.id} className="p-4 border border-gray-200 dark:border-gray-700 rounded-xl flex justify-between bg-white dark:bg-gray-800 shadow-sm">
                                <div>
                                    <b className="dark:text-white block text-sm">{u.name}</b>
                                    <span className="text-xs text-gray-500 block mb-2">{u.address || 'Sem endereço'}</span>
                                    
                                    <div className="flex gap-1.5 flex-wrap">
                                        {(u.modules || ['EXTINTOR', 'HIDRANTE', 'SPK', 'RONDA']).map(m => (
                                            <span key={m} className={`text-[9px] px-2 py-0.5 rounded font-bold uppercase ${m === 'EXTINTOR' ? 'bg-red-100 text-red-700' : m === 'HIDRANTE' ? 'bg-orange-100 text-orange-700' : m === 'SPK' ? 'bg-teal-100 text-teal-700' : 'bg-blue-100 text-blue-700'}`}>
                                                {m}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                                <div className="flex flex-col gap-2 justify-center ml-2">
                                    <button onClick={() => handleEditClick(u)} className="w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center hover:bg-blue-100"><i className="fas fa-pen text-xs"></i></button>
                                    <button onClick={()=>showConfirm("Excluir?", ()=>onDeleteUnit(u.id), "error")} className="w-8 h-8 rounded-full bg-red-50 text-red-600 flex items-center justify-center hover:bg-red-100"><i className="fas fa-trash text-xs"></i></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        function UserRegisterScreen({ onNavigate, onSaveUser, usersList, unitsList, onUpdateUser, onDeleteUser, showAlert, showConfirm, backDestination = 'adminMenu' }) {
            const [newUser, setNewUser] = useState({ name: '', pass: '', unit: '', shift: 'DIURNO', role: 'OPERACIONAL' });
            const [editingId, setEditingId] = useState(null);
            const handleSave = async () => {
                if (!newUser.name || !newUser.pass) return showAlert("Dados incompletos.", "warning");
                let finalUnit = newUser.unit;
                const isSuperUser = ['ADMIN', 'SUPERVISOR', 'COORDENADOR'].includes(newUser.role) || newUser.name.toUpperCase() === "ADMIN";
                if (isSuperUser && !finalUnit) finalUnit = "GLOBAL";
                
                const userData = { 
                    name: newUser.name.toUpperCase(), 
                    pass: newUser.pass, 
                    unit: finalUnit || '', 
                    shift: newUser.shift, 
                    role: newUser.role 
                };
                
                if (editingId) { await onUpdateUser(editingId, userData); setEditingId(null); showAlert("Atualizado!", "success"); } 
                else { await onSaveUser(userData); showAlert("Cadastrado!", "success"); }
                setNewUser({ name: '', pass: '', unit: '', shift: 'DIURNO', role: 'OPERACIONAL' });
            };
            const handleEditClick = (u) => { setEditingId(u.id); setNewUser({ name: u.name, pass: u.pass, unit: u.unit || '', shift: u.shift || 'DIURNO', role: u.role || 'OPERACIONAL' }); };
            return (
                <div className="flex flex-col h-full bg-white dark:bg-brand-dark p-4 overflow-y-auto">
                    <div className="absolute top-4 left-4"><button onClick={() => onNavigate(backDestination)} className="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-white shadow-sm"><i className="fas fa-arrow-left"></i></button></div>
                    <div className="mt-16 space-y-4">
                        <select value={newUser.unit} onChange={e => setNewUser({...newUser, unit: e.target.value})} className="w-full p-4 bg-gray-100 rounded-xl font-bold"><option value="">Unidade (Opcional)</option>{unitsList && unitsList.map(u => <option key={u.id} value={u.name}>{u.name}</option>)}</select>
                        <div className="flex gap-2">
                            <select value={newUser.shift} onChange={e => setNewUser({...newUser, shift: e.target.value})} className="flex-1 p-4 bg-gray-100 rounded-xl font-bold"><option value="DIURNO">DIURNO</option><option value="NOTURNO">NOTURNO</option></select>
                            <select value={newUser.role} onChange={e => setNewUser({...newUser, role: e.target.value})} className="flex-1 p-4 bg-gray-100 rounded-xl font-bold text-blue-700"><option value="OPERACIONAL">OPERACIONAL</option><option value="ADMIN">ADMIN</option><option value="SUPERVISOR">SUPERVISOR</option><option value="COORDENADOR">COORDENADOR</option></select>
                        </div>
                        <input value={newUser.name} onChange={e => setNewUser({...newUser, name: e.target.value})} placeholder="NOME" className="w-full p-4 bg-gray-100 rounded-xl font-bold" />
                        <input value={newUser.pass} onChange={e => setNewUser({...newUser, pass: e.target.value})} placeholder="SENHA" className="w-full p-4 bg-gray-100 rounded-xl font-bold" />
                        <button onClick={handleSave} className="w-full py-4 bg-brand-orange text-white rounded-xl font-bold">SALVAR</button>
                    </div>
                    <div className="mt-8 space-y-2">{usersList && usersList.map(u => (<div key={u.id} className="p-4 border rounded-xl flex justify-between"><div><b>{u.name}</b> <span className="text-xs bg-gray-200 px-1 rounded">{u.shift || 'D'}</span> {['ADMIN', 'SUPERVISOR', 'COORDENADOR'].includes(u.role) && <span className="text-xs bg-purple-200 text-purple-800 px-1 rounded ml-1">{u.role}</span>}<br/><span className="text-xs">{u.unit || 'GLOBAL'}</span></div><div><button onClick={() => handleEditClick(u)} className="mr-2 text-blue-500"><i className="fas fa-pen"></i></button><button onClick={()=>showConfirm("Excluir?", ()=>onDeleteUser(u.id), "error")} className="text-red-500"><i className="fas fa-trash"></i></button></div></div>))}</div>
                </div>
            );
